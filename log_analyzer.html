<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CpGdDqaLog 분석기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
:root{
  --blue-900:#1a3360;--blue-800:#1f4589;--blue-700:#2a5aaf;--blue-600:#3468bc;
  --blue-500:#5282c8;--blue-400:#7aa2d6;--blue-100:#dce8f5;--blue-50:#f0f5fb;
  --bg:#f4f7fc;--surface:#ffffff;--border:#dde4ee;
  --text-primary:#1e293b;--text-secondary:#64748b;
  --shadow-sm:0 2px 8px rgba(42,80,160,0.06);
  --shadow-md:0 4px 20px rgba(42,80,160,0.09);
  --shadow-lg:0 8px 32px rgba(42,80,160,0.12);
  --radius-sm:10px;--radius-md:14px;--radius-lg:18px;
  --red:#e74c3c;--red-bg:#fdecea;
  --orange:#e67e22;--orange-bg:#fef3e2;
  --green:#1e8449;--green-bg:#eafaf1;
  --purple:#6c3483;--purple-bg:#f4ecfd;
  --teal:#0e6655;--teal-bg:#e8f8f5;
  --pink:#943672;--pink-bg:#fdf2f8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Pretendard",-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(145deg,#eaeff8 0%,var(--bg) 60%,#e8edf7 100%);color:var(--text-primary);font-size:14px;min-height:100vh}
.wrap{max-width:1280px;margin:0 auto;padding:24px 20px}

/* 헤더 */
.header-card{background:linear-gradient(135deg,var(--blue-900) 0%,var(--blue-700) 100%);border-radius:var(--radius-lg);padding:28px 32px;margin-bottom:20px;box-shadow:0 8px 32px rgba(30,58,138,0.22);position:relative;overflow:hidden;color:#fff}
.header-card::after{content:'';position:absolute;top:-80px;right:-80px;width:260px;height:260px;background:radial-gradient(circle,rgba(255,255,255,0.07) 0%,transparent 65%);pointer-events:none}
#logTitle{font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.3px}
#logSub{font-size:12px;color:rgba(255,255,255,0.65);margin-top:4px;font-weight:500}
#chipsetLine{font-size:13px;font-weight:700;color:#93c5fd;margin-top:4px}

/* 버튼 */
.btn{padding:8px 16px;border:1.5px solid rgba(255,255,255,0.25);border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.9);transition:all .18s;font-family:inherit}
.btn:hover{background:rgba(255,255,255,0.22);border-color:rgba(255,255,255,0.45)}
.btn-p{background:rgba(255,255,255,0.9);color:var(--blue-800);border-color:transparent}
.btn-p:hover{background:#fff}
.tab-content .btn{background:var(--surface);color:var(--text-secondary);border:1px solid var(--border)}
.tab-content .btn:hover{background:var(--blue-50);color:var(--blue-700);border-color:var(--blue-400)}
.tab-content .btn-p{background:var(--blue-700);color:#fff;border-color:var(--blue-700)}
.tab-content .btn-p:hover{background:var(--blue-800)}

/* 업로드 박스 */
.upload-box{border:2px dashed rgba(255,255,255,0.3);border-radius:var(--radius-md);padding:2rem 1.5rem;margin-top:1.25rem;background:rgba(255,255,255,0.07);text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
.upload-box:hover,.upload-box.drag{border-color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.13)}
.upload-box input[type=file]{display:none}
.upload-box .up-icon{font-size:30px;margin-bottom:8px;opacity:.7}
.upload-box .up-label{font-size:13px;color:rgba(255,255,255,0.85);font-weight:600;margin-bottom:4px}
.upload-box .up-hint{font-size:11px;color:rgba(255,255,255,0.5)}

/* 탭바 */
.tab-bar{display:flex;gap:4px;background:var(--surface);border-radius:var(--radius-md) var(--radius-md) 0 0;padding:10px 16px 0;border:1px solid var(--border);border-bottom:none;flex-wrap:wrap}
.tab{padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-secondary);border:none;background:transparent;border-bottom:3px solid transparent;margin-bottom:-1px;border-radius:var(--radius-sm) var(--radius-sm) 0 0;transition:all .18s;font-family:inherit}
.tab:hover{color:var(--blue-700);background:var(--blue-50)}
.tab.active{color:var(--blue-800);border-bottom-color:var(--blue-600)}

/* 탭 컨텐츠 */
.tab-content{background:var(--surface);border:1px solid var(--border);border-radius:0 0 var(--radius-md) var(--radius-md);padding:24px 28px;box-shadow:var(--shadow-md)}

/* 섹션 레이블 */
.st{font-size:11px;font-weight:700;color:var(--text-secondary);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;margin-top:1.5rem}
.st:first-child{margin-top:0}

/* 메트릭 카드 */
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:4px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;box-shadow:var(--shadow-sm);transition:box-shadow .18s}
.mc:hover{box-shadow:var(--shadow-md)}
.ml{font-size:11px;color:var(--text-secondary);font-weight:700;margin-bottom:5px;letter-spacing:.03em}
.mv{font-size:22px;font-weight:700;color:var(--text-primary);line-height:1.2}
.ms{font-size:11px;color:#94a3b8;margin-top:3px;font-weight:500}
.danger{border-top:3px solid var(--red)}.danger .mv{color:var(--red)}
.warn{border-top:3px solid var(--orange)}.warn .mv{color:var(--orange)}

/* 구분선 */
.divider{border:none;border-top:1px solid var(--border);margin:1.5rem 0}

/* 알림 카드 */
.nc{border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 18px;margin-bottom:10px;background:var(--surface);box-shadow:var(--shadow-sm)}
.nc.critical{border-left:4px solid var(--red)}.nc.warning{border-left:4px solid var(--orange)}
.nc.weak{border-left:4px solid var(--purple)}.nc.antdiff{border-left:4px solid #16a085}.nc.mic{border-left:4px solid var(--red)}
.nt{font-size:13px;font-weight:700;color:var(--text-primary)}
.ns{font-size:12px;color:var(--text-secondary);margin-top:5px;font-weight:500}
.ntags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}

/* 뱃지/태그 */
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700}
.tag{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.tr{background:var(--red-bg);color:var(--red)}
.ta{background:var(--orange-bg);color:var(--orange)}
.tb{background:var(--blue-100);color:var(--blue-800)}
.tp{background:var(--purple-bg);color:var(--purple)}
.tg{background:#f1f5f9;color:#475569}
.tgr{background:var(--green-bg);color:var(--green)}
.ttl{background:var(--teal-bg);color:var(--teal)}
.tpk{background:var(--pink-bg);color:var(--pink)}

/* 테이블 */
.tw{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border);box-shadow:var(--shadow-sm)}
table{border-collapse:collapse;font-size:13px;width:100%}
thead th{background:var(--blue-800);padding:10px 13px;text-align:left;font-weight:700;font-size:12px;color:rgba(255,255,255,0.92);white-space:nowrap}
tbody tr{border-bottom:1px solid #f1f5f9}
tbody tr:last-child{border-bottom:none}
tbody tr:nth-child(even){background:var(--blue-50)}
tbody tr:hover{background:#e5eeff}
tbody td{padding:9px 13px;color:var(--text-primary);font-size:12px;white-space:nowrap;font-weight:500}
.th-sort{cursor:pointer;user-select:none}
.th-sort:hover{background:var(--blue-700)}
.th-sort.asc::after{content:' ↑';color:#93c5fd}
.th-sort.desc::after{content:' ↓';color:#93c5fd}

/* 랭킹 */
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:11px;font-weight:700;background:#f1f5f9;color:var(--text-secondary)}
.rank-badge.r1{background:linear-gradient(135deg,#f6d365,#fda085);color:#7a4f00}
.rank-badge.r2{background:linear-gradient(135deg,#d4d4d4,#a0a0a0);color:#333}
.rank-badge.r3{background:linear-gradient(135deg,#cd7f32,#a0522d);color:#fff}

/* 카테고리 박스 */
.cat-box{border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 20px;margin-bottom:12px;background:var(--surface);box-shadow:var(--shadow-sm)}
.cat-title{font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.bar-label{font-size:12px;color:var(--text-secondary);width:150px;flex-shrink:0;font-weight:600}
.bar-track{flex:1;background:var(--blue-50);border-radius:6px;height:14px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .4s}
.bar-val{font-size:12px;font-weight:600;color:var(--text-primary);min-width:200px;flex-shrink:0}
.ecnt-high{color:var(--red);font-weight:700}

/* detail row */
.detail-row td{padding:0!important}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:4px 16px;padding:12px 18px;background:var(--blue-50);border-top:1px solid var(--blue-100)}
.detail-kv{font-size:11px;display:flex;gap:5px;align-items:baseline}
.detail-k{color:var(--text-secondary);flex-shrink:0;font-weight:600}
.detail-v{color:var(--text-primary);font-weight:700;word-break:break-all}
.det-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 7px;color:var(--text-secondary);border-radius:4px;transition:all .15s}
.det-btn:hover{background:var(--blue-50);color:var(--blue-700)}

/* input/select */
input[type=text],select{padding:8px 12px;font-size:13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text-primary);outline:none;font-family:inherit;font-weight:500;transition:border-color .18s}
input[type=text]:focus,select:focus{border-color:var(--blue-500)}

.no-data{text-align:center;padding:2.5rem;color:#94a3b8;font-size:13px;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
<div class="header-card">
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div style="flex:1;min-width:200px">
      <div style="font-size:20px;font-weight:700;color:#fff;letter-spacing:-.02em" id="logTitle">CpGdDqaLog 분석기</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.65);margin-top:4px" id="logSub">.LOG 파일을 업로드하여 분석을 시작하세요</div>
      <div style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.9);margin-top:4px" id="chipsetLine" style="display:none"></div>
    </div>
    <button class="btn btn-p" onclick="document.getElementById('fileInput').click()">LOG 파일 열기</button>
    <button class="btn" onclick="loadSample()">샘플 데이터</button>
    <button class="btn" id="resetBtn" onclick="resetAll()" style="display:none">다시 로드</button>
  </div>
  <div class="upload-box" id="uploadBox" onclick="document.getElementById('fileInput').click()"
       ondragover="event.preventDefault();this.classList.add('drag')"
       ondragleave="this.classList.remove('drag')"
       ondrop="event.preventDefault();this.classList.remove('drag');handleFile(event.dataTransfer.files[0])">
    <input type="file" id="fileInput" accept=".log,.LOG,.txt" onchange="handleFile(this.files[0])">
    <div class="up-icon">📂</div>
    <div class="up-label">.LOG 파일을 클릭하거나 여기로 드래그하세요</div>
    <div class="up-hint">텍스트 형식의 .LOG 파일 (JSON 스타일 로그)</div>
  </div>
</div>

<div id="dashboard" style="display:none">
  <div class="tab-bar">
    <button class="tab active" onclick="showTab('overview')">전체 요약</button>
    <button class="tab" onclick="showTab('station')">문제 기지국</button>
    <button class="tab" onclick="showTab('mute')">MUTE 분석</button>
    <button class="tab" onclick="showTab('drop')">DROP 분석</button>
    <button class="tab" onclick="showTab('daily')">일별 상세</button>
    <button class="tab" onclick="showTab('trend')">추이 그래프</button>
    <button class="tab" onclick="showTab('raw')">원본 데이터</button>
  </div>
  <div class="tab-content">
    <div id="tab-overview">
      <div class="st">통화 품질</div><div class="mg" id="callM"></div>
      <div class="st">무선 품질</div><div class="mg" id="radioM"></div>
      <div class="st">단말 / 기타</div><div class="mg" id="devM"></div>
      <div class="divider"></div>
      <div class="st">이상 감지 알림</div><div id="notiArea"></div>
    </div>
    <div id="tab-station" style="display:none">
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
        <input type="text" id="stSearch" placeholder="TAC / PCI / 채널 검색..." oninput="renderStationTable()" style="flex:1;min-width:140px">
        <select id="stFilter" onchange="renderStationTable()">
          <option value="">전체</option><option value="critical">위험</option>
          <option value="warning">주의</option><option value="weak">약전계</option>
          <option value="antdiff">Ant Diff</option><option value="normal">정상</option>
        </select>
      </div>
      <div class="tw"><table><thead id="stHead"></thead><tbody id="stBody"></tbody></table></div>
      <div style="font-size:12px;color:#aaa;margin-top:8px" id="stCount"></div>
    </div>
    <div id="tab-mute" style="display:none"><div id="muteContent"></div></div>
    <div id="tab-drop" style="display:none"><div id="dropContent"></div></div>
    <div id="tab-daily" style="display:none"><div id="dailyContent"></div></div>
    <div id="tab-trend" style="display:none"><div id="trendContent"></div></div>
    <div id="tab-raw" style="display:none">
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <input type="text" id="rawSearch" placeholder="검색..." oninput="filterRaw()" style="flex:1;min-width:140px">
        <select id="rawFeat" onchange="filterRaw()"><option value="">모든 Feature</option></select>
        <button class="btn" onclick="exportCSV()">CSV 내보내기</button>
      </div>
      <div class="tw"><table><thead id="rawHead"></thead><tbody id="rawBody"></tbody></table></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:12px;color:#888" id="rawPager"></div>
    </div>
  </div>
</div>
</div>

function handleFile(file){
  if(!file)return;
  if(!/\.(log|txt)$/i.test(file.name)){alert('.LOG 또는 .TXT 파일만 업로드할 수 있습니다.');return;}
  const tryParse=(encoding)=>new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      let text=e.target.result;
      if(text.charCodeAt(0)===0xFEFF)text=text.slice(1); // BOM 제거
      res(text);
    };
    reader.onerror=rej;
    reader.readAsText(file,encoding);
  });
  tryParse('utf-8').then(text=>{
    const rows=text.split('\n').filter(l=>l.trim()).map(parseLine).filter(Boolean);
    if(rows.length>0){doParse(text,file.name);return;}
    // UTF-8 파싱 실패 시 EUC-KR 재시도
    return tryParse('euc-kr').then(text2=>doParse(text2,file.name));
  }).catch(()=>alert('파일을 읽을 수 없습니다.'));
}

function parseLine(line){
  line=line.replace(/\r/g,'');
  if(!line.trim())return null;
  const tabs=line.split('\t');
  let date,time,feature,jsonStr;
  if(tabs.length>=3){
    // 형식: "DATE TIME\tFEATURE\t{JSON}"
    const dt=tabs[0].trim().split(/\s+/);
    if(dt.length<2)return null;
    date=dt[0];time=dt[1];
    feature=tabs[1].trim().toUpperCase();
    jsonStr=tabs.slice(2).join('\t').trim();
  } else if(tabs.length===2){
    // 형식: "DATE TIME FEATURE\t{JSON}"
    const preParts=tabs[0].trim().split(/\s+/);
    if(preParts.length<3)return null;
    date=preParts[0];time=preParts[1];
    feature=preParts.slice(2).join(' ').toUpperCase();
    jsonStr=tabs[1].trim();
  } else {
    // 탭 없음 — { 위치 기준으로 분리
    const bi=line.indexOf('{');if(bi===-1)return null;
    const preParts=line.slice(0,bi).trim().split(/\s+/);
    if(preParts.length<3)return null;
    date=preParts[0];time=preParts[1];
    feature=preParts.slice(2).join(' ').toUpperCase();
    jsonStr=line.slice(bi).trim();
  }
  if(!date||!time||!feature||!jsonStr)return null;
  let obj={};try{obj=JSON.parse(jsonStr);}catch{return null;}
  return{Date:date,Time:time,Feature:feature,...obj};
}
function doParse(text,filename){
  if(!text||!text.trim()){alert('파일 내용이 비어있습니다.');return;}
  // BOM 제거
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  allRows=text.split('\n').filter(l=>l.trim()).map(parseLine).filter(Boolean);
  if(!allRows.length){
    alert('파싱 실패. 로그 형식을 확인해주세요.\n\n지원 형식:\n날짜 시간 Feature{TAB}{JSON}\n날짜 시간 Feature {JSON}');
    return;
  }
  const ks=new Set();allRows.forEach(r=>Object.keys(r).forEach(k=>ks.add(k)));
  allCols=['Date','Time','Feature',...[...ks].filter(k=>!['Date','Time','Feature'].includes(k))];
  buildRlfEvents();
  buildStationMap();
  document.getElementById('uploadBox').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('resetBtn').style.display='';
  buildRlfEvents();
  stSortCol='default';stSortDir='desc';rawOpenIdx=new Set();
  renderHeader(filename);renderOverview();renderMuteTab();renderDropTab();renderDaily();initRaw();
  showTab('overview');
}
function getDates(){return[...new Set(allRows.map(r=>r.Date))].sort();}
function byDate(d){return allRows.filter(r=>r.Date===d);}
function byFeat(f,rows){return(rows||allRows).filter(r=>r.Feature===f);}
function cnt(f,rows){return byFeat(f,rows).length;}
function pct(n,d){return d===0?'0.0':((n/d)*100).toFixed(1);}
function fNum(v){const n=parseFloat(v);return isNaN(n)?null:n;}
function avgArr(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;}
function isOne(v){return v==='1'||v===1;}
function getCellKey(tac,pid,dch){if(!tac&&!pid&&!dch)return null;return`${tac||'?'}|${pid||'?'}|${dch||'?'}`;}

function buildRlfEvents(){
  allRlfEvents=[];rlfByRlfi={};
  byFeat('RLFI').forEach(r=>{
    const [yr,mo]=r.Date.split('-');
    const rlfiKey=`${r.Date}|${r.Time}`;
    rlfByRlfi[rlfiKey]=[];
    for(let i=1;i<=4;i++){
      const tac=r[`TAC${i}`],pid=r[`PID${i}`],dch=r[`DCh${i}`];
      if(!tac||!pid||!dch)continue;
      const tim=(r[`TIM${i}`]||'').trim();
      let date=r.Date,time=r.Time,timeCorrected=false;
      if(tim.includes(',')){
        const ci=tim.indexOf(',');
        const dayStr=tim.slice(0,ci).trim(),timeStr=tim.slice(ci+1).trim();
        if(dayStr&&timeStr){date=`${yr}-${mo}-${dayStr.padStart(2,'0')}`;time=timeStr;timeCorrected=true;}
      }
      const evt={Date:date,Time:time,Feature:'RLF',_rlfiKey:rlfiKey,_slot:i,_timeCorrected:timeCorrected,
        TAC_:tac,PhID:pid,DLCh:dch,RxP0:r[`RxP${i}`],PLMN:r[`PLM${i}`]};
      // 슬롯 전용 필드 복사 (TIM, ACT 등)
      Object.keys(r).forEach(k=>{
        if(!/\d$/.test(k)||k.slice(-1)!==String(i))return;
        const base=k.slice(0,-1);
        if(!['TAC','PID','DCh','RxP','PLM'].includes(base))evt[base]=r[k];
      });
      allRlfEvents.push(evt);
      rlfByRlfi[rlfiKey].push(evt);
    }
  });
}
function buildStationMap(){
  stationMap={};
  const ensure=key=>{if(!stationMap[key])stationMap[key]={key,tac:'',pid:'',dch:'',lbnd:'',drops:[],mutes:[],rlfis:[],cends:[],dropRsrp:[],dropSinr:[],muteRsrp:[],muteSinr:[],rlfiRsrp:[],antDiffDrops:[]};};
  allRows.forEach(r=>{
    const f=r.Feature;
    if(['CEND','DROP','MUTE'].includes(f)){
      const key=getCellKey(r.TAC_,r.PhID,r.DLCh);if(!key)return;
      ensure(key);const s=stationMap[key];
      s.tac=r.TAC_||s.tac;s.pid=r.PhID||s.pid;s.dch=r.DLCh||s.dch;
      if(f==='CEND')s.cends.push(r);
      if(f==='DROP'){
        s.drops.push(r);
        const rsrp=getDropRSRP(r),sinr=getDropSINR(r);
        if(rsrp!==null)s.dropRsrp.push(rsrp);if(sinr!==null)s.dropSinr.push(sinr);
        const r0=fNum(r.RxP0),r1=fNum(r.RxP1);
        if(r0!==null&&r1!==null&&Math.abs(r0-r1)>=20)s.antDiffDrops.push({...r,diff:Math.abs(r0-r1)});
      }
      if(f==='MUTE'){
        s.mutes.push(r);
        if(r.LBND)s.lbnd=r.LBND;
        const rsrp=fNum(r.RSRP),sinr=fNum(r.CINR);
        if(rsrp!==null)s.muteRsrp.push(rsrp);if(sinr!==null)s.muteSinr.push(sinr);
      }
    }
  });
  // RLFI → 개별 RLF 이벤트로 스테이션 맵에 반영
  allRlfEvents.forEach(e=>{
    const key=getCellKey(e.TAC_,e.PhID,e.DLCh);if(!key)return;
    ensure(key);const s=stationMap[key];
    s.tac=e.TAC_;s.pid=e.PhID;s.dch=e.DLCh;
    s.rlfis.push(e);
    const rxp=fNum(e.RxP0);if(rxp!==null)s.rlfiRsrp.push(rxp);
  });
  Object.values(stationMap).forEach(s=>{
    const totalRef=s.cends.length+s.drops.length;
    s.probCount=s.drops.length+s.mutes.length+s.rlfis.length;
    s.problemRate=totalRef>0?((s.drops.length+s.mutes.length)/totalRef*100):0;
    const allRsrp=[...s.dropRsrp,...s.muteRsrp,...s.rlfiRsrp];
    const allSinr=[...s.dropSinr,...s.muteSinr];
    s.avgRsrp=allRsrp.length?parseFloat(avgArr(allRsrp).toFixed(1)):null;
    s.avgSinr=allSinr.length?parseFloat(avgArr(allSinr).toFixed(1)):null;
    s.weakRsrp=s.avgRsrp!==null&&s.avgRsrp<-100;
    s.weakSinr=s.avgSinr!==null&&s.avgSinr<0;
    s.isWeak=s.weakRsrp||s.weakSinr;
    s.hasAntDiff=s.antDiffDrops.length>=2;
    s.score=s.drops.length*10+s.mutes.length*2+s.rlfis.length;
    if(s.probCount>=3&&s.problemRate>=30)s.level='critical';
    else if(s.probCount>=2||s.problemRate>=15)s.level='warning';
    else if(s.isWeak&&s.probCount>=1)s.level='weak';
    else s.level='normal';
  });
}
function getOperator(){
  const cnt={};
  allRows.forEach(r=>{const p=(r.PLMN||'').replace(/[^0-9]/g,'');if(PLMN_OP[p])cnt[p]=(cnt[p]||0)+1;});
  allRlfEvents.forEach(e=>{const p=(e.PLMN||'').replace(/[^0-9]/g,'');if(PLMN_OP[p])cnt[p]=(cnt[p]||0)+1;});
  const top=Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0];
  return top?PLMN_OP[top[0]]||'':'';
}

function calcKPI(rows){

}

const FC={CEND:{bg:'#e8f4fd',tc:'#1a6fa0'},DROP:{bg:'#fdecea',tc:'#c0392b'},MUTE:{bg:'#fef3e2',tc:'#b7640a'},RLFC:{bg:'#eafaf1',tc:'#1e8449'},RLFI:{bg:'#eafaf1',tc:'#1e8449'},CRSH:{bg:'#fdecea',tc:'#c0392b'},SIMD:{bg:'#f4ecfd',tc:'#6c3483'},DAST:{bg:'#fef3e2',tc:'#b7640a'}};
function getDropRSRP(r){const a=fNum(r.RxP0),b=fNum(r.RxP1);return a!==null&&b!==null?(a+b)/2:a;}
function getDropSINR(r){const a=fNum(r.SNR0),b=fNum(r.SNR1);return a!==null&&b!==null?(a+b)/2:a;}
function getRawRSRP(r){
  if(r.Feature==='DROP'){const v=getDropRSRP(r);return v!==null?v.toFixed(1):'';}
  if(r.Feature==='RLF')return r.RxP0??'';
  return r.RSRP??'';
}
function getRawSINR(r){if(r.Feature==='DROP'){const v=getDropSINR(r);return v!==null?v.toFixed(1):'';}return r.CINR??'';}
function getRawCause(r){
  const f=r.Feature;
  if(f==='RLF'){const v=r.CAU??'';return v!==''?`${v} : ${CAU_CODES[String(v)]||'Unknown'}`:''}
  if(f==='RLFI'){const cs=[1,2,3,4].map(i=>r[`CAU${i}`]).filter(v=>v!==undefined&&v!=='');return cs.map(v=>`${v} : ${CAU_CODES[String(v)]||'Unknown'}`).join(' / ');}
  if(f==='DROP'){const c=String(r.SIPR||'').trim();return c?`${c} : ${DROP_CAUSES[c]||'Unknown'}`:''}
  if(f==='MUTE'){const keys=['RSMT','RNMT','DBMT','UBMT','SAMS','SMBU','TXMT','MCST'];return keys.filter(k=>r[k]==='1'||r[k]===1).join(', ');}
  if(f==='PSCI')return r.FLCD??'';
  if(f==='REGI')return r.FRSN??'';
  if(f==='PDPF'||f==='PDPI')return r.ENDR??'';
  if(f==='ATTF'||f==='ATTI')return r.EMMC??r.ESMC??'';
  return'';
}
function buildRawRows(){
  const rows=[];
  allRows.forEach(r=>{
    if(r.Feature==='RLFI'){
      const key=`${r.Date}|${r.Time}`;
      (rlfByRlfi[key]||[]).forEach(e=>rows.push(e));
    } else {
      rows.push(r);
    }
  });
  return rows;
}

}
const RAW_FIXED=['Date','Time','Feature','PLMN','ACT','TAC(HEX)','TAC(DEC)','PhID','Band(DLCh)','RSRP','SINR','Cause'];
const RAW_COL_W={'Date':88,'Time':68,'Feature':58,'PLMN':100,'ACT':62,'TAC(HEX)':72,'TAC(DEC)':72,'PhID':52,'Band(DLCh)':108,'RSRP':58,'SINR':52,'Cause':190};
const SKIP_KEYS=new Set(['Date','Time','Feature']);
let rawOpenIdx=new Set();
function toggleDetail(globalIdx){
  const key=String(globalIdx);
  if(rawOpenIdx.has(key))rawOpenIdx.delete(key);else rawOpenIdx.add(key);
  renderRaw();
}
function renderRaw(){
  const start=(rawPage-1)*RP,page=rawFiltered.slice(start,start+RP);
  const ACT_MAP={'2':'3G','4':'LTE','6':'NR'};
  document.getElementById('rawHead').innerHTML='<tr>'+RAW_FIXED.map(c=>`<th style="min-width:${RAW_COL_W[c]||70}px;width:${RAW_COL_W[c]||70}px">${c}</th>`).join('')+'<th style="width:32px"></th></tr>';
  document.getElementById('rawBody').innerHTML=page.length?page.map((r,i)=>{
    const gi=start+i;
    const isOpen=rawOpenIdx.has(String(gi));
    const mainRow='<tr>'+RAW_FIXED.map(c=>{
      const v=r[c]??'';
      if(c==='Feature'){const col=FC[v]||{bg:'#f5f5f5',tc:'#555'};return`<td><span class="badge" style="background:${col.bg};color:${col.tc}">${v}</span></td>`;}
      if(c==='PLMN'){const raw=(r.PLMN||'').replace(/[^0-9]/g,'');const op=PLMN_OP[raw]||'';return`<td>${raw?raw+(op?`(${op})`:''):''}</td>`;}
      if(c==='ACT'){const v2=String(r.ACT_??'').trim();const lbl=ACT_MAP[v2];return`<td>${v2?(lbl?`${v2}(${lbl})`:v2):''}</td>`;}
      if(c==='TAC(HEX)')return`<td>${r.TAC_??''}</td>`;
      if(c==='TAC(DEC)'){const h=String(r.TAC_??'').trim();const d=h?parseInt(h,16):NaN;return`<td>${isNaN(d)?'':d}</td>`;}
      if(c==='Band(DLCh)')return`<td>${getRawBandDLCh(r)}</td>`;
      if(c==='RSRP')return`<td>${getRawRSRP(r)}</td>`;
      if(c==='SINR')return`<td>${getRawSINR(r)}</td>`;
      if(c==='Cause'){const cv=getRawCause(r);return`<td style="font-size:11px;color:var(--text-secondary);white-space:normal;line-height:1.4">${cv}</td>`;}
      return`<td>${v}</td>`;
    }).join('')+`<td><button class="det-btn" onclick="toggleDetail(${gi})" title="세부 정보">${isOpen?'▲':'▼'}</button></td></tr>`;
    if(!isOpen)return mainRow;
    let detailRow;
    if(r.Feature==='RLFI'){
      const key=`${r.Date}|${r.Time}`;
      const evts=rlfByRlfi[key]||[];
      const thS='style="padding:4px 8px;background:#ddeeff;font-weight:600;font-size:11px;border-bottom:1px solid #c0d8f0"';
      const tdS='style="padding:4px 8px;font-size:11px;border-bottom:1px solid #eef2f8"';
      const rows=evts.map((e,idx)=>{
        const corrected=e._timeCorrected&&(e.Date!==r.Date||e.Time!==r.Time);
        const cauVal=e.CAU??'';
        const cauLabel=cauVal!==''?(CAU_CODES[String(cauVal)]||`Code ${cauVal}`):'';
        const cauColor={'1':'#c0392b','2':'#c0392b','4':'#c0392b','5':'#c0392b','7':'#e67e22','6':'#e67e22','3':'#8e44ad','8':'#7f8c8d','0':'#aaa'}[String(cauVal)]||'#aaa';
        return`<tr>
          <td ${tdS}>${idx+1}</td>
          <td ${tdS} style="padding:4px 8px;font-size:11px;border-bottom:1px solid #eef2f8;${corrected?'color:#2980b9;font-weight:600':''}">${e.Date}</td>
          <td ${tdS} style="padding:4px 8px;font-size:11px;border-bottom:1px solid #eef2f8;${corrected?'color:#2980b9;font-weight:600':''}">${e.Time}${corrected?` <span style="font-size:10px;color:#888">(보정)</span>`:''}</td>
          <td ${tdS}>${e.TAC_}</td><td ${tdS}>${e.PhID}</td><td ${tdS}>${e.DLCh}</td>
          <td ${tdS}>${e.RxP0??'-'}</td>
          <td ${tdS}>${cauVal!==''?`<span style="font-weight:600;color:${cauColor}">[${cauVal}] ${cauLabel}</span>`:'-'}</td>
          <td ${tdS}>${e.PLMN??'-'}</td>
        </tr>`;
      }).join('');
      detailRow=`<tr class="detail-row"><td colspan="${RAW_FIXED.length+1}">
        <div style="padding:10px 14px;background:#f0f6ff;border-top:1px solid #c8daf5">
          <div style="font-size:11px;font-weight:700;color:#2980b9;margin-bottom:6px">개별 RLF 이벤트 ${evts.length}건 (RLFI 이벤트시간: ${r.Date} ${r.Time})</div>
          <table style="border-collapse:collapse;width:auto">
            <thead><tr><th ${thS}>No</th><th ${thS}>실제 날짜</th><th ${thS}>실제 시간</th><th ${thS}>TAC</th><th ${thS}>PCI</th><th ${thS}>DLCh</th><th ${thS}>RxP</th><th ${thS}>원인 (CAU)</th><th ${thS}>PLMN</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div></td></tr>`;
    } else {
      const kvPairs=Object.entries(r).filter(([k])=>!SKIP_KEYS.has(k)&&!k.startsWith('_')&&r[k]!==''&&r[k]!==null&&r[k]!==undefined);
      detailRow=`<tr class="detail-row"><td colspan="${RAW_FIXED.length+1}"><div class="detail-grid">${kvPairs.map(([k,v])=>`<div class="detail-kv"><span class="detail-k">${k}</span><span class="detail-v">${v}</span></div>`).join('')}</div></td></tr>`;
    }
    return mainRow+detailRow;
  }).join(''):`<tr><td colspan="${RAW_FIXED.length+1}" class="no-data">데이터 없음</td></tr>`;
  const total=Math.ceil(rawFiltered.length/RP);
  let btns='';
  for(let p=Math.max(1,rawPage-2);p<=Math.min(total,rawPage+2);p++)
    btns+=`<button class="btn${p===rawPage?' btn-p':''}" style="padding:5px 11px;font-size:12px;margin:0 2px" onclick="rawGo(${p})">${p}</button>`;
  document.getElementById('rawPager').innerHTML=`<span>${rawFiltered.length}건 / 전체 ${buildRawRows().length}건</span><div>${btns}</div>`;
}
function rawGo(p){rawPage=p;renderRaw();}
function exportCSV(){
  const esc=v=>`"${String(v??'').replace(/"/g,'""')}"`;
  const csv=[allCols.join(','),...rawFiltered.map(r=>allCols.map(c=>esc(r[c])).join(','))].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='log_parsed.csv';a.click();
}
function showTab(name){
  ['overview','station','mute','drop','daily','trend','raw'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===name?'block':'none';});
  document.querySelectorAll('.tab').forEach((b,i)=>{b.classList.toggle('active',['overview','station','mute','drop','daily','trend','raw'][i]===name);});
  if(name==='trend')renderTrend();
  if(name==='station')renderStationTable();
  if(name==='drop')renderDropTab();
}
</script>
</body>
</html>
