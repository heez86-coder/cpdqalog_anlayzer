<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:14px}
.wrap{max-width:1200px;margin:0 auto;padding:1.5rem}
.btn{padding:7px 14px;border:1px solid #ccc;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:#444}
.btn:hover{background:#f0f0f0}
.btn-p{background:#e8e8e8;color:#111;border-color:#aaa;font-weight:500}
.st{font-size:11px;font-weight:600;color:#888;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;margin-top:1.25rem}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:.5rem}
.mc{background:#fff;border-radius:8px;padding:12px 14px;border:1px solid #e8e8e8}
.ml{font-size:11px;color:#888;margin-bottom:4px}
.mv{font-size:20px;font-weight:600;color:#111;line-height:1.2}
.ms{font-size:11px;color:#aaa;margin-top:3px}
.danger .mv{color:#c0392b}
.warn .mv{color:#b7640a}
.tab-bar{display:flex;gap:0;margin-bottom:1rem;border-bottom:1px solid #ddd;flex-wrap:wrap;background:#fff;border-radius:10px 10px 0 0;padding:0 1rem}
.tab{padding:10px 14px;font-size:13px;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;background:transparent;border-top:none;border-left:none;border-right:none}
.tab:hover{color:#333}
.tab.active{color:#1a1a1a;font-weight:600;border-bottom-color:#2980b9}
.upload-box{border:2px dashed #ccc;border-radius:10px;padding:2rem 1.25rem;margin-top:1rem;background:#fafafa;text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
.upload-box:hover,.upload-box.drag{border-color:#2980b9;background:#f0f6fd}
.upload-box input[type=file]{display:none}
.upload-box .up-icon{font-size:32px;margin-bottom:8px;color:#aaa}
.upload-box .up-label{font-size:13px;color:#666;margin-bottom:4px}
.upload-box .up-hint{font-size:11px;color:#aaa}
.tw{overflow-x:auto;border:1px solid #e0e0e0;border-radius:10px}
table{border-collapse:collapse;font-size:12px;width:100%}
thead th{background:#f5f5f5;padding:9px 11px;text-align:left;font-weight:600;color:#666;font-size:11px;border-bottom:1px solid #e0e0e0;white-space:nowrap}
tbody tr{border-bottom:1px solid #f0f0f0}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fafafa}
tbody td{padding:8px 11px;color:#222;font-size:12px;white-space:nowrap}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.nc{border:1px solid #e8e8e8;border-radius:10px;padding:1rem 1.25rem;margin-bottom:10px;background:#fff}
.nc.critical{border-left:4px solid #e74c3c}
.nc.warning{border-left:4px solid #e67e22}
.nc.weak{border-left:4px solid #8e44ad}
.nc.antdiff{border-left:4px solid #16a085}
.nc.mic{border-left:4px solid #c0392b}
.nt{font-size:13px;font-weight:600;color:#111}
.ns{font-size:12px;color:#666}
.ntags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:500}
.tr{background:#fdecea;color:#c0392b}
.ta{background:#fef3e2;color:#b7640a}
.tb{background:#e8f4fd;color:#1a6fa0}
.tp{background:#f4ecfd;color:#6c3483}
.tg{background:#f5f5f5;color:#555}
.tgr{background:#eafaf1;color:#1e8449}
.ttl{background:#e8f8f5;color:#0e6655}
.tpk{background:#fdf2f8;color:#943672}
.cat-box{border:1px solid #e8e8e8;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;background:#fff}
.cat-title{font-size:13px;font-weight:600;color:#111;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:12px;color:#666;width:145px;flex-shrink:0}
.bar-track{flex:1;background:#f0f0f0;border-radius:4px;height:14px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}
.bar-val{font-size:12px;font-weight:500;color:#222;min-width:200px;flex-shrink:0}
.ecnt-high{color:#c0392b;font-weight:700}
.divider{border:none;border-top:1px solid #eee;margin:1.25rem 0}
.header-card{background:#fff;border-radius:10px;padding:1.25rem 1.5rem;margin-bottom:1rem;border:1px solid #e8e8e8}
.tab-content{background:#fff;border-radius:0 0 10px 10px;padding:1.25rem 1.5rem;border:1px solid #ddd;border-top:none}
input[type=text],select{padding:7px 10px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#111;outline:none}
input[type=text]:focus,select:focus{border-color:#2980b9}
.no-data{text-align:center;padding:2rem;color:#aaa;font-size:13px}
.th-sort{cursor:pointer;user-select:none}
.th-sort:hover{background:#e8e8e8;color:#333}

.th-sort.desc::after{content:' ↓';color:#2980b9}

<div class="wrap">
<div class="header-card">
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">

      <div style="font-size:12px;font-weight:600;color:#2980b9;margin-top:2px" id="chipsetLine" style="display:none"></div>
    </div>

    <button class="btn" onclick="loadSample()">샘플 데이터</button>
    <button class="btn" id="resetBtn" onclick="resetAll()" style="display:none">다시 로드</button>
  </div>
  <div class="upload-box" id="uploadBox" onclick="document.getElementById('fileInput').click()"

       ondragleave="this.classList.remove('drag')"
       ondrop="event.preventDefault();this.classList.remove('drag');handleFile(event.dataTransfer.files[0])">
    <input type="file" id="fileInput" accept=".log,.LOG,.txt" onchange="handleFile(this.files[0])">
    <div class="up-icon">📂</div>
    <div class="up-label">.LOG 파일을 클릭하거나 여기로 드래그하세요</div>
    <div class="up-hint">텍스트 형식의 .LOG 파일 (JSON 스타일 로그)</div>
  </div>
</div>

<div id="dashboard" style="display:none">

      <div class="divider"></div>
      <div class="st">이상 감지 알림</div><div id="notiArea"></div>
    </div>
    <div id="tab-station" style="display:none">
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
        <input type="text" id="stSearch" placeholder="TAC / PCI / 채널 검색..." oninput="renderStationTable()" style="flex:1;min-width:140px">
        <select id="stFilter" onchange="renderStationTable()">

          <option value="warning">주의</option><option value="weak">약전계</option>
          <option value="antdiff">Ant Diff</option><option value="normal">정상</option>
        </select>

      <div class="tw"><table><thead id="stHead"></thead><tbody id="stBody"></tbody></table></div>
      <div style="font-size:12px;color:#aaa;margin-top:8px" id="stCount"></div>
    </div>
    <div id="tab-mute" style="display:none"><div id="muteContent"></div></div>
    <div id="tab-drop" style="display:none"><div id="dropContent"></div></div>
    <div id="tab-daily" style="display:none"><div id="dailyContent"></div></div>
    <div id="tab-trend" style="display:none"><div id="trendContent"></div></div>
    <div id="tab-raw" style="display:none">
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <input type="text" id="rawSearch" placeholder="검색..." oninput="filterRaw()" style="flex:1;min-width:140px">
        <select id="rawFeat" onchange="filterRaw()"><option value="">모든 Feature</option></select>
        <button class="btn" onclick="exportCSV()">CSV 내보내기</button>
      </div>
      <div class="tw"><table><thead id="rawHead"></thead><tbody id="rawBody"></tbody></table></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:12px;color:#888" id="rawPager"></div>
    </div>
  </div>
</div>
</div>

function handleFile(file){
  if(!file)return;
  if(!/\.(log|txt)$/i.test(file.name)){alert('.LOG 또는 .TXT 파일만 업로드할 수 있습니다.');return;}
  const tryParse=(encoding)=>new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      let text=e.target.result;
      if(text.charCodeAt(0)===0xFEFF)text=text.slice(1); // BOM 제거
      res(text);
    };
    reader.onerror=rej;
    reader.readAsText(file,encoding);
  });
  tryParse('utf-8').then(text=>{
    const rows=text.split('\n').filter(l=>l.trim()).map(parseLine).filter(Boolean);
    if(rows.length>0){doParse(text,file.name);return;}
    // UTF-8 파싱 실패 시 EUC-KR 재시도
    return tryParse('euc-kr').then(text2=>doParse(text2,file.name));
  }).catch(()=>alert('파일을 읽을 수 없습니다.'));
}
function loadSample(){doParse(SAMPLE,'sample.LOG');}
function resetAll(){
  allRows=[];allRlfEvents=[];rlfByRlfi={};charts.forEach(c=>c.destroy());charts=[];
  document.getElementById('dashboard').style.display='none';

  document.getElementById('resetBtn').style.display='none';
  document.getElementById('fileInput').value='';
  document.getElementById('logTitle').textContent='CpGdDqaLog 분석기';
  document.getElementById('logSub').textContent='.LOG 파일을 업로드하여 분석을 시작하세요';
  document.getElementById('chipsetLine').textContent='';
}
function parseLine(line){
  line=line.replace(/\r/g,'');
  if(!line.trim())return null;
  const tabs=line.split('\t');
  let date,time,feature,jsonStr;
  if(tabs.length>=3){
    // 형식: "DATE TIME\tFEATURE\t{JSON}"
    const dt=tabs[0].trim().split(/\s+/);
    if(dt.length<2)return null;
    date=dt[0];time=dt[1];
    feature=tabs[1].trim().toUpperCase();
    jsonStr=tabs.slice(2).join('\t').trim();
  } else if(tabs.length===2){
    // 형식: "DATE TIME FEATURE\t{JSON}"
    const preParts=tabs[0].trim().split(/\s+/);
    if(preParts.length<3)return null;
    date=preParts[0];time=preParts[1];
    feature=preParts.slice(2).join(' ').toUpperCase();
    jsonStr=tabs[1].trim();
  } else {
    // 탭 없음 — { 위치 기준으로 분리
    const bi=line.indexOf('{');if(bi===-1)return null;
    const preParts=line.slice(0,bi).trim().split(/\s+/);
    if(preParts.length<3)return null;
    date=preParts[0];time=preParts[1];
    feature=preParts.slice(2).join(' ').toUpperCase();
    jsonStr=line.slice(bi).trim();
  }
  if(!date||!time||!feature||!jsonStr)return null;
  let obj={};try{obj=JSON.parse(jsonStr);}catch{return null;}
  return{Date:date,Time:time,Feature:feature,...obj};
}
function doParse(text,filename){
  if(!text||!text.trim()){alert('파일 내용이 비어있습니다.');return;}
  // BOM 제거
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  allRows=text.split('\n').filter(l=>l.trim()).map(parseLine).filter(Boolean);
  if(!allRows.length){
    alert('파싱 실패. 로그 형식을 확인해주세요.\n\n지원 형식:\n날짜 시간 Feature{TAB}{JSON}\n날짜 시간 Feature {JSON}');
    return;
  }
  const ks=new Set();allRows.forEach(r=>Object.keys(r).forEach(k=>ks.add(k)));
  allCols=['Date','Time','Feature',...[...ks].filter(k=>!['Date','Time','Feature'].includes(k))];
  buildRlfEvents();
  buildStationMap();
  document.getElementById('uploadBox').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('resetBtn').style.display='';
  buildRlfEvents();
  stSortCol='default';stSortDir='desc';rawOpenIdx=new Set();
  renderHeader(filename);renderOverview();renderMuteTab();renderDropTab();renderDaily();initRaw();
  showTab('overview');
}
function getDates(){return[...new Set(allRows.map(r=>r.Date))].sort();}
function byDate(d){return allRows.filter(r=>r.Date===d);}
function byFeat(f,rows){return(rows||allRows).filter(r=>r.Feature===f);}
function cnt(f,rows){return byFeat(f,rows).length;}
function pct(n,d){return d===0?'0.0':((n/d)*100).toFixed(1);}
function fNum(v){const n=parseFloat(v);return isNaN(n)?null:n;}
function avgArr(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;}
function isOne(v){return v==='1'||v===1;}
function getCellKey(tac,pid,dch){if(!tac&&!pid&&!dch)return null;return`${tac||'?'}|${pid||'?'}|${dch||'?'}`;}

function buildRlfEvents(){
  allRlfEvents=[];rlfByRlfi={};
  byFeat('RLFI').forEach(r=>{
    const [yr,mo]=r.Date.split('-');
    const rlfiKey=`${r.Date}|${r.Time}`;
    rlfByRlfi[rlfiKey]=[];
    for(let i=1;i<=4;i++){
      const tac=r[`TAC${i}`],pid=r[`PID${i}`],dch=r[`DCh${i}`];
      if(!tac||!pid||!dch)continue;
      const tim=(r[`TIM${i}`]||'').trim();
      let date=r.Date,time=r.Time,timeCorrected=false;
      if(tim.includes(',')){
        const ci=tim.indexOf(',');
        const dayStr=tim.slice(0,ci).trim(),timeStr=tim.slice(ci+1).trim();
        if(dayStr&&timeStr){date=`${yr}-${mo}-${dayStr.padStart(2,'0')}`;time=timeStr;timeCorrected=true;}
      }
      const evt={Date:date,Time:time,Feature:'RLF',_rlfiKey:rlfiKey,_slot:i,_timeCorrected:timeCorrected,
        TAC_:tac,PhID:pid,DLCh:dch,RxP0:r[`RxP${i}`],PLMN:r[`PLM${i}`]};
      // 슬롯 전용 필드 복사 (TIM, ACT 등)
      Object.keys(r).forEach(k=>{
        if(!/\d$/.test(k)||k.slice(-1)!==String(i))return;
        const base=k.slice(0,-1);
        if(!['TAC','PID','DCh','RxP','PLM'].includes(base))evt[base]=r[k];
      });
      allRlfEvents.push(evt);
      rlfByRlfi[rlfiKey].push(evt);
    }
  });
}
function buildStationMap(){
  stationMap={};
  const ensure=key=>{if(!stationMap[key])stationMap[key]={key,tac:'',pid:'',dch:'',drops:[],mutes:[],rlfis:[],cends:[],dropRsrp:[],dropSinr:[],muteRsrp:[],muteSinr:[],rlfiRsrp:[],antDiffDrops:[]};};
  allRows.forEach(r=>{
    const f=r.Feature;
    if(['CEND','DROP','MUTE'].includes(f)){
      const key=getCellKey(r.TAC_,r.PhID,r.DLCh);if(!key)return;
      ensure(key);const s=stationMap[key];
      s.tac=r.TAC_||s.tac;s.pid=r.PhID||s.pid;s.dch=r.DLCh||s.dch;
      if(f==='CEND')s.cends.push(r);
      if(f==='DROP'){
        s.drops.push(r);
        const rsrp=fNum(r.RxP0),sinr=fNum(r.SNR0);
        if(rsrp!==null)s.dropRsrp.push(rsrp);if(sinr!==null)s.dropSinr.push(sinr);
        const r0=fNum(r.RxP0),r1=fNum(r.RxP1);
        if(r0!==null&&r1!==null&&Math.abs(r0-r1)>=20)s.antDiffDrops.push({...r,diff:Math.abs(r0-r1)});
      }
      if(f==='MUTE'){
        s.mutes.push(r);
        const rsrp=fNum(r.RSRP),sinr=fNum(r.CINR);
        if(rsrp!==null)s.muteRsrp.push(rsrp);if(sinr!==null)s.muteSinr.push(sinr);
      }
    }
  });
  // RLFI → 개별 RLF 이벤트로 스테이션 맵에 반영
  allRlfEvents.forEach(e=>{
    const key=getCellKey(e.TAC_,e.PhID,e.DLCh);if(!key)return;
    ensure(key);const s=stationMap[key];
    s.tac=e.TAC_;s.pid=e.PhID;s.dch=e.DLCh;
    s.rlfis.push(e);
    const rxp=fNum(e.RxP0);if(rxp!==null)s.rlfiRsrp.push(rxp);
  });
  Object.values(stationMap).forEach(s=>{
    const totalRef=s.cends.length+s.drops.length;
    s.probCount=s.drops.length+s.mutes.length+s.rlfis.length;
    s.problemRate=totalRef>0?((s.drops.length+s.mutes.length)/totalRef*100):0;
    const allRsrp=[...s.dropRsrp,...s.muteRsrp,...s.rlfiRsrp];
    const allSinr=[...s.dropSinr,...s.muteSinr];
    s.avgRsrp=allRsrp.length?parseFloat(avgArr(allRsrp).toFixed(1)):null;
    s.avgSinr=allSinr.length?parseFloat(avgArr(allSinr).toFixed(1)):null;
    s.weakRsrp=s.avgRsrp!==null&&s.avgRsrp<-100;
    s.weakSinr=s.avgSinr!==null&&s.avgSinr<0;
    s.isWeak=s.weakRsrp||s.weakSinr;
    s.hasAntDiff=s.antDiffDrops.length>=2;
    if(s.probCount>=3&&s.problemRate>=30)s.level='critical';
    else if(s.probCount>=2||s.problemRate>=15)s.level='warning';
    else if(s.isWeak&&s.probCount>=1)s.level='weak';
    else s.level='normal';
  });
}

function getChipset(){
  const jver=(allRows.find(r=>r.JVER)||{}).JVER||'';
  if(jver.startsWith('S'))return'LSI';
  if(jver.startsWith('Q'))return'QC';
  if(jver.startsWith('M'))return'MTK';
  return jver?'Unknown':'';
}

function calcKPI(rows){
  const cend=cnt('CEND',rows),drop=cnt('DROP',rows),mute=cnt('MUTE',rows),total=cend+drop;
  const rlfcRows=byFeat('RLFC',rows);
  let lrlf=0,ldch=0;rlfcRows.forEach(r=>{lrlf+=parseFloat(r.LRLF||0);ldch+=parseFloat(r.LDCH||0);});
  return{cend,drop,mute,total,dropRate:pct(drop,total),muteRate:pct(mute,cend),lrlf,ldch,rlfRate:pct(lrlf,ldch),
    crsh:cnt('CRSH',rows),simd:cnt('SIMD',rows),dast:cnt('DAST',rows),mmrj:cnt('MMRJ',rows),rfpd:cnt('RFPD',rows)};
}
function mCard(label,val,sub,cls){return`<div class="mc${cls?' '+cls:''}"><div class="ml">${label}</div><div class="mv">${val}</div>${sub?`<div class="ms">${sub}</div>`:''}</div>`;}
function renderOverview(){

  document.getElementById('devM').innerHTML=

    mCard('SIM 탈착',k.simd+'건','');
  renderNoti();
}

function renderMuteTab(){

    });

    ${mCard('Tx (송화) 이상',txRows.length+'건',pct(txRows.length,total)+'%',txRows.length>0?'warn':'')}
    ${mCard('마이크 이상',micRowsAll.length+'건',pct(micRowsAll.length,total)+'%',micRowsAll.length>0?'warn':'')}
    ${unknownRows.length>0?mCard('유형 미분류',unknownRows.length+'건',''):''}

  html+=buildCat('Rx (수화) 이상 — RSMT · RNMT · DBMT',rxTypes,rxRows,'tb');

    stDrops.forEach((s,i)=>{
      const adCnt=s.antDiffDrops.length;
      const wkCnt=s.drops.filter(r=>fNum(r.RxP0)!==null&&fNum(r.RxP0)<-100).length;
      html+=`<div class="bar-row">
        <div class="bar-label" style="width:180px"><span class="rank-badge${i<3?' r'+(i+1):''}" style="margin-right:5px">${i+1}</span>TAC ${s.tac} / PCI ${s.pid}<br><span style="font-size:11px;color:#aaa">CH ${s.dch}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${(s.drops.length/maxD*100).toFixed(1)}%;background:#e74c3c"></div></div>
        <div class="bar-val">${s.drops.length}건${adCnt?` &nbsp;<span class="badge ttl" style="font-size:10px">Ant Diff ${adCnt}</span>`:''}${wkCnt?` &nbsp;<span class="badge tp" style="font-size:10px">약전계 ${wkCnt}</span>`:''}</div>
      </div>`;
    });
    html+=`</div>`;
  }
  // 일별 DROP
  html+=`<div class="divider"></div><div class="st">일별 DROP 현황</div>`;
  getDates().forEach(d=>{
    const dRows=byFeat('DROP',byDate(d));if(!dRows.length)return;
    const r0=dRows.map(r=>fNum(r.RxP0)).filter(v=>v!==null);
    const s0=dRows.map(r=>fNum(r.SNR0)).filter(v=>v!==null);
    const ad=dRows.filter(r=>{const a=fNum(r.RxP0),b=fNum(r.RxP1);return a!==null&&b!==null&&Math.abs(a-b)>=20;});
    html+=`<div style="margin-bottom:1.25rem"><div class="st">${d} · DROP ${dRows.length}건</div><div class="mg">
      ${mCard('DROP',dRows.length+'건','')}
      ${r0.length?mCard('avg RxP0',avgArr(r0).toFixed(1)+'dBm','',avgArr(r0)<-100?'warn':''):''}
      ${s0.length?mCard('avg SNR0',avgArr(s0).toFixed(1)+'dB','',avgArr(s0)<0?'warn':''):''}
      ${ad.length?mCard('Ant Diff',ad.length+'건','','danger'):''}
    </div></div>`;
  });
  document.getElementById('dropContent').innerHTML=html;
}
function renderStationTable(){
  const q=(document.getElementById('stSearch').value||'').toLowerCase();
  const lv=document.getElementById('stFilter').value;
  const colFn={cend:s=>s.cends.length,drop:s=>s.drops.length,mute:s=>s.mutes.length,rlfi:s=>s.rlfis.length,prob:s=>s.problemRate,rsrp:s=>s.avgRsrp??-999,sinr:s=>s.avgSinr??-999};
  const lvO={critical:0,warning:1,weak:2,normal:3};
  let all=Object.values(stationMap).filter(s=>{
    if(lv==='antdiff')return s.hasAntDiff;
    if(lv&&lv!=='antdiff'&&s.level!==lv)return false;
    if(q&&!`${s.tac}${s.pid}${s.dch}`.toLowerCase().includes(q))return false;
    return true;
  });
  if(stSortCol==='default'||!colFn[stSortCol]){
    all.sort((a,b)=>(lvO[a.level]??9)-(lvO[b.level]??9)||(b.probCount-a.probCount));
  } else {
    const fn=colFn[stSortCol];
    all.sort((a,b)=>stSortDir==='desc'?fn(b)-fn(a):fn(a)-fn(b));
  }
  const lbl={critical:'위험',warning:'주의',weak:'약전계',normal:'정상'};
  const lc={critical:'tr',warning:'ta',weak:'tp',normal:'tgr'};
  const si=c=>stSortCol===c?` ${stSortDir}`:'';
  const thS=(col,label)=>`<th class="th-sort${stSortCol===col?' '+stSortDir:''}" onclick="stSort('${col}')">${label}</th>`;
  document.getElementById('stHead').innerHTML=`<tr><th>#</th><th>상태</th><th>TAC</th><th>PCI</th><th>채널</th>${thS('cend','CEND')}${thS('drop','DROP')}${thS('mute','MUTE')}${thS('rlfi','RLF')}${thS('prob','이상률')}${thS('rsrp','avg RSRP')}${thS('sinr','avg SINR')}<th>Ant Diff</th></tr>`;
  document.getElementById('stBody').innerHTML=all.length?all.map((s,i)=>{
    const rk=i+1;
    const rkCls=rk<=3?`r${rk}`:'';
    return`<tr>
      <td><span class="rank-badge ${rkCls}">${rk}</span></td>
      <td><span class="badge ${lc[s.level]}">${lbl[s.level]}</span>${s.hasAntDiff?` <span class="badge ttl">ANT</span>`:''}</td>
      <td>${s.tac}</td><td>${s.pid}</td><td>${s.dch}</td>
      <td>${s.cends.length}</td>
      <td style="color:${s.drops.length>0?'#c0392b':'inherit'}">${s.drops.length}</td>
      <td style="color:${s.mutes.length>0?'#b7640a':'inherit'}">${s.mutes.length}</td>
      <td style="color:${s.rlfis.length>0?'#1a6fa0':'inherit'}">${s.rlfis.length}</td>
      <td style="color:${s.problemRate>=15?'#c0392b':'inherit'};font-weight:${s.problemRate>=15?700:400}">${s.problemRate.toFixed(1)}%</td>
      <td style="color:${s.weakRsrp?'#6c3483':'inherit'}">${s.avgRsrp!==null?s.avgRsrp+'dBm':'-'}</td>
      <td style="color:${s.weakSinr?'#6c3483':'inherit'}">${s.avgSinr!==null?s.avgSinr+'dB':'-'}</td>
      <td style="color:${s.hasAntDiff?'#0e6655':'inherit'};font-weight:${s.hasAntDiff?700:400}">${s.antDiffDrops.length>0?s.antDiffDrops.length+'건 (최대 '+Math.max(...s.antDiffDrops.map(d=>d.diff)).toFixed(0)+'dB)':'-'}</td>
    </tr>`;
  }).join(''):'<tr><td colspan="13" class="no-data">해당 기지국이 없습니다.</td></tr>';
  document.getElementById('stCount').textContent=`총 ${all.length}개 기지국`;
}
function renderDaily(){
  const dates=getDates();let html='';
  dates.forEach(d=>{
    const rows=byDate(d);const k=calcKPI(rows);
    html+=`<div style="margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid #eee"><div class="st">${d}</div><div class="mg">${mCard('통화횟수',k.total+'건')}${mCard('Calldrop',k.drop+'건',k.dropRate+'%',parseFloat(k.dropRate)>1?'danger':'')}${mCard('MUTE',k.mute+'건',k.muteRate+'%',parseFloat(k.muteRate)>1?'danger':'')}${mCard('RLF율',k.rlfRate+'%',`LRLF ${k.lrlf} / LDCH ${k.ldch}`,parseFloat(k.rlfRate)>2?'warn':'')}${mCard('Crash',k.crsh+'건','',k.crsh>0?'danger':'')}${mCard('DAST',k.dast+'건','')}</div></div>`;
  });
  document.getElementById('dailyContent').innerHTML=html;
}
function renderTrend(){
  const dates=getDates();
  const dr=[],mr=[],rr=[],cc=[];
  dates.forEach(d=>{const k=calcKPI(byDate(d));dr.push(parseFloat(k.dropRate));mr.push(parseFloat(k.muteRate));rr.push(parseFloat(k.rlfRate));cc.push(k.total);});
  const labels=dates.map(d=>d.slice(5));
  document.getElementById('trendContent').innerHTML=`<div class="st">일별 발생률 추이 (%)</div><div style="position:relative;height:240px;margin-bottom:2rem"><canvas id="c1"></canvas></div><div class="st">일별 통화횟수</div><div style="position:relative;height:200px"><canvas id="c2"></canvas></div>`;
  setTimeout(()=>{
    charts.forEach(c=>c.destroy());charts=[];
    charts.push(new Chart(document.getElementById('c1'),{type:'line',data:{labels,datasets:[{label:'Calldrop율',data:dr,borderColor:'#e74c3c',backgroundColor:'rgba(231,76,60,0.07)',tension:.3,pointRadius:5,pointBackgroundColor:'#e74c3c',borderWidth:2.5},{label:'MUTE율',data:mr,borderColor:'#e67e22',backgroundColor:'rgba(230,126,34,0.07)',tension:.3,pointRadius:5,pointBackgroundColor:'#e67e22',borderWidth:2.5},{label:'RLF율',data:rr,borderColor:'#2980b9',backgroundColor:'rgba(41,128,185,0.07)',tension:.3,pointRadius:5,pointBackgroundColor:'#2980b9',borderWidth:2.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true}},scales:{x:{ticks:{font:{size:12}},grid:{color:'rgba(0,0,0,0.05)'}},y:{ticks:{font:{size:12},callback:v=>v.toFixed(1)+'%'},grid:{color:'rgba(0,0,0,0.05)'}}}}}));
    charts.push(new Chart(document.getElementById('c2'),{type:'bar',data:{labels,datasets:[{label:'통화횟수',data:cc,backgroundColor:'#aed6f1',borderColor:'#2980b9',borderWidth:1.5,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:12}},grid:{display:false}},y:{ticks:{font:{size:12}},grid:{color:'rgba(0,0,0,0.05)'}}}}}));
  },100);
}

function initRaw(){
  const feats=[...new Set(allRows.map(r=>r.Feature))].sort();
  document.getElementById('rawFeat').innerHTML='<option value="">모든 Feature</option>'+feats.map(f=>`<option value="${f}">${f}</option>`).join('');
  rawFiltered=[...allRows];rawPage=1;renderRaw();
}
function filterRaw(){
  const q=document.getElementById('rawSearch').value.toLowerCase();
  const feat=document.getElementById('rawFeat').value;
  rawFiltered=allRows.filter(r=>{
    if(feat&&r.Feature!==feat)return false;
    if(q&&!JSON.stringify(r).toLowerCase().includes(q))return false;
    return true;
  });rawPage=1;rawOpenIdx=new Set();renderRaw();
}
const FC={CEND:{bg:'#e8f4fd',tc:'#1a6fa0'},DROP:{bg:'#fdecea',tc:'#c0392b'},MUTE:{bg:'#fef3e2',tc:'#b7640a'},RLFC:{bg:'#eafaf1',tc:'#1e8449'},RLFI:{bg:'#eafaf1',tc:'#1e8449'},CRSH:{bg:'#fdecea',tc:'#c0392b'},SIMD:{bg:'#f4ecfd',tc:'#6c3483'},DAST:{bg:'#fef3e2',tc:'#b7640a'}};
const RAW_FIXED=['Date','Time','Feature','TAC_','PhID','DLCh','RSRP','RxP0','RxP1','SNR0','SNR1','CINR'];
const SKIP_KEYS=new Set(['Date','Time','Feature']);
let rawOpenIdx=new Set();
function toggleDetail(globalIdx){
  const key=String(globalIdx);
  if(rawOpenIdx.has(key))rawOpenIdx.delete(key);else rawOpenIdx.add(key);
  renderRaw();
}
function renderRaw(){
  const start=(rawPage-1)*RP,page=rawFiltered.slice(start,start+RP);
  document.getElementById('rawHead').innerHTML='<tr>'+RAW_FIXED.map(c=>`<th>${c}</th>`).join('')+'<th></th></tr>';
  document.getElementById('rawBody').innerHTML=page.length?page.map((r,i)=>{
    const gi=start+i;
    const isOpen=rawOpenIdx.has(String(gi));
    const mainRow='<tr>'+RAW_FIXED.map(c=>{
      const v=r[c]??'';
      if(c==='Feature'){const col=FC[v]||{bg:'#f5f5f5',tc:'#555'};return`<td><span class="badge" style="background:${col.bg};color:${col.tc}">${v}</span></td>`;}
      return`<td>${v}</td>`;
    }).join('')+`<td><button class="det-btn" onclick="toggleDetail(${gi})" title="세부 정보">${isOpen?'▲':'▼'}</button></td></tr>`;
    if(!isOpen)return mainRow;
    let detailRow;
    if(r.Feature==='RLFI'){
      const key=`${r.Date}|${r.Time}`;
      const evts=rlfByRlfi[key]||[];
      const thS='style="padding:4px 8px;background:#ddeeff;font-weight:600;font-size:11px;border-bottom:1px solid #c0d8f0"';
      const tdS='style="padding:4px 8px;font-size:11px;border-bottom:1px solid #eef2f8"';
      const rows=evts.map((e,idx)=>{
        const corrected=e._timeCorrected&&(e.Date!==r.Date||e.Time!==r.Time);
        const cauVal=e.CAU??'';
        const cauLabel=cauVal!==''?(CAU_CODES[String(cauVal)]||`Code ${cauVal}`):'';
        const cauColor={'1':'#c0392b','2':'#c0392b','4':'#c0392b','5':'#c0392b','7':'#e67e22','6':'#e67e22','3':'#8e44ad','8':'#7f8c8d','0':'#aaa'}[String(cauVal)]||'#aaa';
        return`<tr>
          <td ${tdS}>${idx+1}</td>
          <td ${tdS} style="padding:4px 8px;font-size:11px;border-bottom:1px solid #eef2f8;${corrected?'color:#2980b9;font-weight:600':''}">${e.Date}</td>
          <td ${tdS} style="padding:4px 8px;font-size:11px;border-bottom:1px solid #eef2f8;${corrected?'color:#2980b9;font-weight:600':''}">${e.Time}${corrected?` <span style="font-size:10px;color:#888">(보정)</span>`:''}</td>
          <td ${tdS}>${e.TAC_}</td><td ${tdS}>${e.PhID}</td><td ${tdS}>${e.DLCh}</td>
          <td ${tdS}>${e.RxP0??'-'}</td>
          <td ${tdS}>${cauVal!==''?`<span style="font-weight:600;color:${cauColor}">[${cauVal}] ${cauLabel}</span>`:'-'}</td>
          <td ${tdS}>${e.PLMN??'-'}</td>
        </tr>`;
      }).join('');
      detailRow=`<tr class="detail-row"><td colspan="${RAW_FIXED.length+1}">
        <div style="padding:10px 14px;background:#f0f6ff;border-top:1px solid #c8daf5">
          <div style="font-size:11px;font-weight:700;color:#2980b9;margin-bottom:6px">개별 RLF 이벤트 ${evts.length}건 (RLFI 이벤트시간: ${r.Date} ${r.Time})</div>
          <table style="border-collapse:collapse;width:auto">
            <thead><tr><th ${thS}>No</th><th ${thS}>실제 날짜</th><th ${thS}>실제 시간</th><th ${thS}>TAC</th><th ${thS}>PCI</th><th ${thS}>DLCh</th><th ${thS}>RxP</th><th ${thS}>원인 (CAU)</th><th ${thS}>PLMN</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div></td></tr>`;
    } else {
      const kvPairs=Object.entries(r).filter(([k])=>!SKIP_KEYS.has(k)&&r[k]!==''&&r[k]!==null&&r[k]!==undefined);
      detailRow=`<tr class="detail-row"><td colspan="${RAW_FIXED.length+1}"><div class="detail-grid">${kvPairs.map(([k,v])=>`<div class="detail-kv"><span class="detail-k">${k}</span><span class="detail-v">${v}</span></div>`).join('')}</div></td></tr>`;
    }
    return mainRow+detailRow;
  }).join(''):`<tr><td colspan="${RAW_FIXED.length+1}" class="no-data">데이터 없음</td></tr>`;
  const total=Math.ceil(rawFiltered.length/RP);
  let btns='';
  for(let p=Math.max(1,rawPage-2);p<=Math.min(total,rawPage+2);p++)
    btns+=`<button class="btn${p===rawPage?' btn-p':''}" style="padding:5px 11px;font-size:12px;margin:0 2px" onclick="rawGo(${p})">${p}</button>`;
  document.getElementById('rawPager').innerHTML=`<span>${rawFiltered.length}건 / 전체 ${allRows.length}건</span><div>${btns}</div>`;
}
function rawGo(p){rawPage=p;renderRaw();}
function exportCSV(){
  const esc=v=>`"${String(v??'').replace(/"/g,'""')}"`;
  const csv=[allCols.join(','),...rawFiltered.map(r=>allCols.map(c=>esc(r[c])).join(','))].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='log_parsed.csv';a.click();
}
function showTab(name){
  ['overview','station','mute','drop','daily','trend','raw'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===name?'block':'none';});
  document.querySelectorAll('.tab').forEach((b,i)=>{b.classList.toggle('active',['overview','station','mute','drop','daily','trend','raw'][i]===name);});
  if(name==='trend')renderTrend();
  if(name==='station')renderStationTable();
  if(name==='drop')renderDropTab();
}
</script>
</body>
</html>
