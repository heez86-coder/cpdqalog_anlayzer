function togglePaste(){const e=document.getElementById('pasteBox');e.style.display=e.style.display==='none'?'block':'none';}
function loadSample(){document.getElementById('pasteInput').value=SAMPLE;document.getElementById('pasteBox').style.display='block';doParse();}
function resetAll(){
  allRows=[];charts.forEach(c=>c.destroy());charts=[];
  document.getElementById('dashboard').style.display='none';
  document.getElementById('resetBtn').style.display='none';
  document.getElementById('logTitle').textContent='л„ӨнҠёмӣҢнҒ¬ н’Ҳм§Ҳ лЎңк·ё л¶„м„қкё°';
  document.getElementById('logSub').textContent='лЎңк·ё нҢҢмқјмқ„ л¶ҷм—¬л„Јм–ҙ л¶„м„қмқ„ мӢңмһ‘н•ҳм„ёмҡ”';
}
function parseLine(line){
  line=line.replace(/\r/g,'');
  const ti=line.indexOf('\t');if(ti===-1)return null;
  const pre=line.slice(0,ti).trim(),jp=line.slice(ti+1).trim();
  const parts=pre.split(' ');if(parts.length<3)return null;
  let obj={};try{obj=JSON.parse(jp);}catch{return null;}
  return{Date:parts[0],Time:parts[1],Feature:parts.slice(2).join(' ').toUpperCase(),...obj};
}
function doParse(){
  const text=document.getElementById('pasteInput').value.trim();if(!text)return;
  allRows=text.split('\n').filter(l=>l.trim()).map(parseLine).filter(Boolean);
  if(!allRows.length){alert('нҢҢмӢұ мӢӨнҢЁ. лЎңк·ё нҳ•мӢқмқ„ нҷ•мқён•ҙмЈјм„ёмҡ”.\n\nнҳ•мӢқ: лӮ м§ң мӢңк°„ Feature[нғӯ]{JSON}');return;}
  const ks=new Set();allRows.forEach(r=>Object.keys(r).forEach(k=>ks.add(k)));
  allCols=['Date','Time','Feature',...[...ks].filter(k=>!['Date','Time','Feature'].includes(k))];
  buildStationMap();
  document.getElementById('pasteBox').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('resetBtn').style.display='';
  renderHeader();renderOverview();renderMuteTab();renderDaily();initRaw();
  showTab('overview');
}
function getDates(){return[...new Set(allRows.map(r=>r.Date))].sort();}
function byDate(d){return allRows.filter(r=>r.Date===d);}
function byFeat(f,rows){return(rows||allRows).filter(r=>r.Feature===f);}
function cnt(f,rows){return byFeat(f,rows).length;}
function pct(n,d){return d===0?'0.0':((n/d)*100).toFixed(1);}
function fNum(v){const n=parseFloat(v);return isNaN(n)?null:n;}
function avgArr(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;}
function isOne(v){return v==='1'||v===1;}
function getCellKey(tac,pid,dch){if(!tac&&!pid&&!dch)return null;return`${tac||'?'}|${pid||'?'}|${dch||'?'}`;}

function buildStationMap(){
  stationMap={};
  const ensure=key=>{if(!stationMap[key])stationMap[key]={key,tac:'',pid:'',dch:'',drops:[],mutes:[],rlfis:[],cends:[],dropRsrp:[],dropSinr:[],muteRsrp:[],muteSinr:[],rlfiRsrp:[],antDiffDrops:[]};};
  allRows.forEach(r=>{
    const f=r.Feature;
    if(['CEND','DROP','MUTE'].includes(f)){
      const key=getCellKey(r.TAC_,r.PhID,r.DLCh);if(!key)return;
      ensure(key);const s=stationMap[key];
      s.tac=r.TAC_||s.tac;s.pid=r.PhID||s.pid;s.dch=r.DLCh||s.dch;
      if(f==='CEND')s.cends.push(r);
      if(f==='DROP'){
        s.drops.push(r);
        const rsrp=fNum(r.RxP0),sinr=fNum(r.SNR0);
        if(rsrp!==null)s.dropRsrp.push(rsrp);if(sinr!==null)s.dropSinr.push(sinr);
        const r0=fNum(r.RxP0),r1=fNum(r.RxP1);
        if(r0!==null&&r1!==null&&Math.abs(r0-r1)>=20)s.antDiffDrops.push({...r,diff:Math.abs(r0-r1)});
      }
      if(f==='MUTE'){
        s.mutes.push(r);
        const rsrp=fNum(r.RSRP),sinr=fNum(r.CINR);
        if(rsrp!==null)s.muteRsrp.push(rsrp);if(sinr!==null)s.muteSinr.push(sinr);
      }
    }
    if(f==='RLFI'){
      for(let i=1;i<=4;i++){
        const tac=r[`TAC${i}`],pid=r[`PID${i}`],dch=r[`DCh${i}`];
        if(!tac||!pid||!dch)continue;
        const key=getCellKey(tac,pid,dch);if(!key)continue;
        ensure(key);const s=stationMap[key];
        s.tac=tac;s.pid=pid;s.dch=dch;s.rlfis.push(r);
        const rxp=fNum(r[`RxP${i}`]);if(rxp!==null)s.rlfiRsrp.push(rxp);
      }
    }
  });
  Object.values(stationMap).forEach(s=>{
    const totalRef=s.cends.length+s.drops.length;
    s.probCount=s.drops.length+s.mutes.length+s.rlfis.length;
    s.problemRate=totalRef>0?((s.drops.length+s.mutes.length)/totalRef*100):0;
    const allRsrp=[...s.dropRsrp,...s.muteRsrp,...s.rlfiRsrp];
    const allSinr=[...s.dropSinr,...s.muteSinr];
    s.avgRsrp=allRsrp.length?parseFloat(avgArr(allRsrp).toFixed(1)):null;
    s.avgSinr=allSinr.length?parseFloat(avgArr(allSinr).toFixed(1)):null;
    s.weakRsrp=s.avgRsrp!==null&&s.avgRsrp<-100;
    s.weakSinr=s.avgSinr!==null&&s.avgSinr<0;
    s.isWeak=s.weakRsrp||s.weakSinr;
    s.hasAntDiff=s.antDiffDrops.length>=2;
    if(s.probCount>=3&&s.problemRate>=30)s.level='critical';
    else if(s.probCount>=2||s.problemRate>=15)s.level='warning';
    else if(s.isWeak&&s.probCount>=1)s.level='weak';
    else s.level='normal';
  });
}

function renderHeader(){
  const dates=getDates();
  const antCnt=Object.values(stationMap).filter(s=>s.hasAntDiff).length;
  const micCnt=byFeat('MUTE').filter(r=>MIC_TYPES.some(t=>isOne(r[t.key]))).length;
  document.getElementById('logTitle').textContent=`лЎңк·ё : ${dates[0]} ~ ${dates[dates.length-1]} (${dates.length}мқјм№ҳ лҚ°мқҙн„° л¶„м„қ)`;
  document.getElementById('logSub').textContent=`мҙқ ${allRows.length.toLocaleString()}кұҙ мқҙлІӨнҠё В· Feature ${[...new Set(allRows.map(r=>r.Feature))].length}мў… В· кё°м§Җкөӯ ${Object.keys(stationMap).length}к°ң к°җм§Җ${antCnt>0?' В· вҡ  Ant Diff мқҳмӢ¬ '+antCnt+'к°ң':''}${micCnt>0?' В· вҡ  л§ҲмқҙнҒ¬ мқҙмғҒ '+micCnt+'кұҙ':''}`;
}
function calcKPI(rows){
  const cend=cnt('CEND',rows),drop=cnt('DROP',rows),mute=cnt('MUTE',rows),total=cend+drop;
  const rlfcRows=byFeat('RLFC',rows);
  let lrlf=0,ldch=0;rlfcRows.forEach(r=>{lrlf+=parseFloat(r.LRLF||0);ldch+=parseFloat(r.LDCH||0);});
  return{cend,drop,mute,total,dropRate:pct(drop,total),muteRate:pct(mute,cend),lrlf,ldch,rlfRate:pct(lrlf,ldch),
    crsh:cnt('CRSH',rows),simd:cnt('SIMD',rows),dast:cnt('DAST',rows),mmrj:cnt('MMRJ',rows),rfpd:cnt('RFPD',rows)};
}
function mCard(label,val,sub,cls){return`<div class="mc${cls?' '+cls:''}"><div class="ml">${label}</div><div class="mv">${val}</div>${sub?`<div class="ms">${sub}</div>`:''}</div>`;}
function renderOverview(){
  const k=calcKPI(allRows);
  document.getElementById('callM').innerHTML=
    mCard('мҙқ нҶөнҷ”нҡҹмҲҳ',k.total.toLocaleString()+'кұҙ')+
    mCard('Calldrop',k.drop+'кұҙ',`л°ңмғқлҘ  ${k.dropRate}%`,parseFloat(k.dropRate)>1?'danger':'')+
    mCard('MUTE л°ңмғқ',k.mute+'кұҙ',`л°ңмғқлҘ  ${k.muteRate}%`,parseFloat(k.muteRate)>1?'danger':'');
  document.getElementById('radioM').innerHTML=
    mCard('RLF л°ңмғқ',k.lrlf+'кұҙ',`RLFмңЁ ${k.rlfRate}%`,parseFloat(k.rlfRate)>2?'warn':'')+
    mCard('DAST',k.dast+'кұҙ','Data Stall')+
    mCard('RFPD',k.rfpd+'кұҙ','Tx PD Power')+
    mCard('MMRJ',k.mmrj+'кұҙ','MM Reject');
  document.getElementById('devM').innerHTML=
    mCard('CP Crash',k.crsh+'кұҙ','',k.crsh>0?'danger':'')+
    mCard('SIM нғҲм°©',k.simd+'кұҙ','');
  renderNoti();
}

  }
  const antDiffSt=Object.values(stationMap).filter(s=>s.hasAntDiff).sort((a,b)=>b.antDiffDrops.length-a.antDiffDrops.length);

  });
  const stations=Object.values(stationMap).filter(s=>s.level!=='normal').sort((a,b)=>{const o={critical:0,warning:1,weak:2};return(o[a.level]||9)-(o[b.level]||9)||(b.probCount-a.probCount);});
  const lbl={critical:'мң„н—ҳ',warning:'мЈјмқҳ',weak:'м•Ҫм „кі„'};
  const lc={critical:'tr',warning:'ta',weak:'tp'};
  stations.forEach(s=>{
    html+=`<div class="nc ${s.level}"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="badge ${lc[s.level]}">${lbl[s.level]}</span><span class="nt">TAC ${s.tac} / PCI ${s.pid} / CH ${s.dch}</span></div><div class="ns" style="margin-top:6px">л¬ём ң мқҙлІӨнҠё ${s.probCount}кұҙ В· мқҙмғҒлҘ  ${s.problemRate.toFixed(1)}%${s.avgRsrp!==null?' В· RSRP '+s.avgRsrp+'dBm':''}${s.avgSinr!==null?' / SINR '+s.avgSinr+'dB':''}</div><div class="ntags">${s.drops.length?`<span class="tag tr">DROP ${s.drops.length}кұҙ</span>`:''}${s.mutes.length?`<span class="tag ta">MUTE ${s.mutes.length}кұҙ</span>`:''}${s.rlfis.length?`<span class="tag tb">RLFI ${s.rlfis.length}кұҙ</span>`:''}${s.cends.length?`<span class="tag tgr">CEND ${s.cends.length}кұҙ</span>`:''}${s.weakRsrp?`<span class="tag tp">RSRP ${s.avgRsrp}dBm</span>`:''}${s.weakSinr?`<span class="tag tp">SINR ${s.avgSinr}dB</span>`:''}${s.hasAntDiff?`<span class="tag ttl">Ant Diff ${s.antDiffDrops.length}кұҙ</span>`:''}</div></div>`;

}

function renderMuteTab(){
  const muteRows=byFeat('MUTE');
  const total=muteRows.length;
  if(!total){document.getElementById('muteContent').innerHTML='<div class="no-data">MUTE лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ.</div>';return;}
  const soundRows=muteRows.filter(r=>SOUND_TYPES.some(t=>isOne(r[t.key])));
  const micRowsAll=muteRows.filter(r=>MIC_TYPES.some(t=>isOne(r[t.key])));
  const unknownRows=muteRows.filter(r=>![...SOUND_TYPES,...MIC_TYPES].some(t=>isOne(r[t.key])));
  function buildCat(title,types,rows,badgeCls){
    const catTotal=rows.length;
    let h=`<div class="cat-box"><div class="cat-title"><span class="badge ${badgeCls}">${title}</span><span style="font-size:12px;color:#888">${catTotal}кұҙ</span></div>`;
    const maxN=Math.max(...types.map(t=>rows.filter(r=>isOne(r[t.key])).length),1);
    types.forEach(t=>{
      const tRows=rows.filter(r=>isOne(r[t.key]));const n=tRows.length;
      const p=total>0?(n/total*100):0;
      const ecnts=tRows.map(r=>fNum(r.ECNT)).filter(v=>v!==null);
      const avgE=ecnts.length?avgArr(ecnts).toFixed(1):'-';
      const highE=ecnts.filter(v=>v>=5).length;
      const blers=t.bler?tRows.map(r=>fNum(r.BLER)).filter(v=>v!==null&&v>0):[];
      const avgBler=blers.length?avgArr(blers).toFixed(1):null;
      h+=`<div class="bar-row"><div class="bar-label">${t.label}<br><span style="font-size:11px;color:#aaa">${t.desc}</span></div><div class="bar-track"><div class="bar-fill" style="width:${maxN>0?(n/maxN*100).toFixed(1):0}%;background:${t.color}"></div></div><div class="bar-val">${n}кұҙ (${p.toFixed(1)}%)${n>0?`&nbsp;<span style="font-size:11px;color:#888">ECNT avg ${avgE}${highE>0?` &nbsp;<span class="ecnt-high">вҡ  вүҘ5: ${highE}кұҙ</span>`:''}</span>`:''}${avgBler!==null?`&nbsp;<span style="font-size:11px;color:#b7640a">BLER avg ${avgBler}%</span>`:''}</div></div>`;
    });
    return h+'</div>';
  }
  let html=`<div class="st">м „мІҙ кё°к°„ MUTE мң нҳ• л¶„нҸ¬</div><div class="mg">${mCard('м „мІҙ MUTE',total+'кұҙ','')}${mCard('мқҢм§Ҳ мқҙмғҒ',soundRows.length+'кұҙ',pct(soundRows.length,total)+'%')}${mCard('л§ҲмқҙнҒ¬ мқҙмғҒ',micRowsAll.length+'кұҙ',pct(micRowsAll.length,total)+'%',micRowsAll.length>0?'warn':'')}${unknownRows.length>0?mCard('мң нҳ• лҜёл¶„лҘҳ',unknownRows.length+'кұҙ',''):''}</div>`;
  html+=buildCat('мқҢм§Ҳ мқҙмғҒ',SOUND_TYPES,soundRows,'ta');
  html+=buildCat('л§ҲмқҙнҒ¬ мқҙмғҒ',MIC_TYPES,micRowsAll,'tpk');
  html+=`<div class="divider"></div><div class="st">мқјлі„ MUTE мң нҳ• нҳ„нҷ©</div>`;
  getDates().forEach(d=>{
    const dRows=byFeat('MUTE',byDate(d));if(!dRows.length)return;
    html+=`<div style="margin-bottom:1.25rem"><div class="st">${d} В· MUTE ${dRows.length}кұҙ</div><div class="mg">`;
    [...SOUND_TYPES,...MIC_TYPES].forEach(t=>{
      const n=dRows.filter(r=>isOne(r[t.key])).length;if(!n)return;
      const ecnts=dRows.filter(r=>isOne(r[t.key])).map(r=>fNum(r.ECNT)).filter(v=>v!==null);
      const avgE=ecnts.length?avgArr(ecnts).toFixed(1):'-';
      const highE=ecnts.filter(v=>v>=5).length;
      html+=`<div class="mc"><div class="ml">${t.label}</div><div class="mv">${n}кұҙ</div><div class="ms">ECNT avg ${avgE}${highE>0?` В· <span class="ecnt-high">вүҘ5: ${highE}кұҙ</span>`:''}</div></div>`;
    });
    html+=`</div></div>`;
  });
  document.getElementById('muteContent').innerHTML=html;
}

function renderStationTable(){

  const all=Object.values(stationMap).filter(s=>{
    if(lv==='antdiff')return s.hasAntDiff;
    if(lv&&lv!=='antdiff'&&s.level!==lv)return false;
    if(q&&!`${s.tac}${s.pid}${s.dch}`.toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>{const o={critical:0,warning:1,weak:2,normal:3};return(o[a.level]||9)-(o[b.level]||9)||(b.probCount-a.probCount);});
  const lbl={critical:'мң„н—ҳ',warning:'мЈјмқҳ',weak:'м•Ҫм „кі„',normal:'м •мғҒ'};
  const lc={critical:'tr',warning:'ta',weak:'tp',normal:'tgr'};
  document.getElementById('stHead').innerHTML=`<tr><th>мғҒнғң</th><th>TAC</th><th>PCI</th><th>мұ„л„җ</th><th>CEND</th><th>DROP</th><th>MUTE</th><th>RLFI</th><th>мқҙмғҒлҘ </th><th>avg RSRP</th><th>avg SINR</th><th>Ant Diff</th></tr>`;
  document.getElementById('stBody').innerHTML=all.length?all.map(s=>`<tr><td><span class="badge ${lc[s.level]}">${lbl[s.level]}</span>${s.hasAntDiff?` <span class="badge ttl">ANT</span>`:''}</td><td>${s.tac}</td><td>${s.pid}</td><td>${s.dch}</td><td>${s.cends.length}</td><td style="color:${s.drops.length>0?'#c0392b':'inherit'}">${s.drops.length}</td><td style="color:${s.mutes.length>0?'#b7640a':'inherit'}">${s.mutes.length}</td><td style="color:${s.rlfis.length>0?'#1a6fa0':'inherit'}">${s.rlfis.length}</td><td style="color:${s.problemRate>=15?'#c0392b':'inherit'};font-weight:${s.problemRate>=15?'700':'400'}">${s.problemRate.toFixed(1)}%</td><td style="color:${s.weakRsrp?'#6c3483':'inherit'}">${s.avgRsrp!==null?s.avgRsrp+'dBm':'-'}</td><td style="color:${s.weakSinr?'#6c3483':'inherit'}">${s.avgSinr!==null?s.avgSinr+'dB':'-'}</td><td style="color:${s.hasAntDiff?'#0e6655':'inherit'};font-weight:${s.hasAntDiff?'700':'400'}">${s.antDiffDrops.length>0?s.antDiffDrops.length+'кұҙ (мөңлҢҖ '+Math.max(...s.antDiffDrops.map(d=>d.diff)).toFixed(0)+'dB)':'-'}</td></tr>`).join(''):'<tr><td colspan="12" class="no-data">н•ҙлӢ№ кё°м§Җкөӯмқҙ м—ҶмҠөлӢҲлӢӨ.</td></tr>';
  document.getElementById('stCount').textContent=`мҙқ ${all.length}к°ң кё°м§Җкөӯ`;
}

function initRaw(){
  const feats=[...new Set(allRows.map(r=>r.Feature))].sort();
  document.getElementById('rawFeat').innerHTML='<option value="">лӘЁл“  Feature</option>'+feats.map(f=>`<option value="${f}">${f}</option>`).join('');
  rawFiltered=[...allRows];rawPage=1;renderRaw();
}
function filterRaw(){
  const q=document.getElementById('rawSearch').value.toLowerCase();
  const feat=document.getElementById('rawFeat').value;
  rawFiltered=allRows.filter(r=>{
    if(feat&&r.Feature!==feat)return false;
    if(q&&!JSON.stringify(r).toLowerCase().includes(q))return false;
    return true;
  });rawPage=1;renderRaw();
}
const FC={CEND:{bg:'#e8f4fd',tc:'#1a6fa0'},DROP:{bg:'#fdecea',tc:'#c0392b'},MUTE:{bg:'#fef3e2',tc:'#b7640a'},RLFC:{bg:'#eafaf1',tc:'#1e8449'},RLFI:{bg:'#eafaf1',tc:'#1e8449'},CRSH:{bg:'#fdecea',tc:'#c0392b'},SIMD:{bg:'#f4ecfd',tc:'#6c3483'},DAST:{bg:'#fef3e2',tc:'#b7640a'}};
function renderRaw(){
  const cols=allCols.slice(0,10);
  const start=(rawPage-1)*RP,page=rawFiltered.slice(start,start+RP);
  document.getElementById('rawHead').innerHTML='<tr>'+cols.map(c=>`<th>${c}</th>`).join('')+'</tr>';
  document.getElementById('rawBody').innerHTML=page.length?page.map(r=>'<tr>'+cols.map(c=>{
    const v=r[c]??'';
    if(c==='Feature'){const col=FC[v]||{bg:'#f5f5f5',tc:'#555'};return`<td><span class="badge" style="background:${col.bg};color:${col.tc}">${v}</span></td>`;}
    return`<td>${String(v).length>30?String(v).slice(0,28)+'вҖҰ':v}</td>`;
  }).join('')+'</tr>').join(''):'<tr><td colspan="'+cols.length+'" class="no-data">лҚ°мқҙн„° м—ҶмқҢ</td></tr>';
  const total=Math.ceil(rawFiltered.length/RP);
  let btns='';
  for(let p=Math.max(1,rawPage-2);p<=Math.min(total,rawPage+2);p++)
    btns+=`<button class="btn${p===rawPage?' btn-p':''}" style="padding:5px 11px;font-size:12px;margin:0 2px" onclick="rawGo(${p})">${p}</button>`;
  document.getElementById('rawPager').innerHTML=`<span>${rawFiltered.length}кұҙ / м „мІҙ ${allRows.length}кұҙ</span><div>${btns}</div>`;
}
function rawGo(p){rawPage=p;renderRaw();}
function exportCSV(){
  const esc=v=>`"${String(v??'').replace(/"/g,'""')}"`;
  const csv=[allCols.join(','),...rawFiltered.map(r=>allCols.map(c=>esc(r[c])).join(','))].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='log_parsed.csv';a.click();
}
function showTab(name){
  ['overview','station','mute','daily','trend','raw'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===name?'block':'none';});
  document.querySelectorAll('.tab').forEach((b,i)=>{b.classList.toggle('active',['overview','station','mute','daily','trend','raw'][i]===name);});
  if(name==='trend')renderTrend();
  if(name==='station')renderStationTable();
}
</script>
</body>
