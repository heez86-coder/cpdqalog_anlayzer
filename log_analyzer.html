<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CpGdDqaLog 분석기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
:root{
  --blue-900:#1a3360;--blue-800:#1f4589;--blue-700:#2a5aaf;--blue-600:#3468bc;
  --blue-500:#5282c8;--blue-400:#7aa2d6;--blue-100:#dce8f5;--blue-50:#f0f5fb;
  --bg:#f4f7fc;--surface:#ffffff;--border:#dde4ee;
  --text-primary:#1e293b;--text-secondary:#64748b;
  --shadow-sm:0 2px 8px rgba(42,80,160,0.06);
  --shadow-md:0 4px 20px rgba(42,80,160,0.09);
  --shadow-lg:0 8px 32px rgba(42,80,160,0.12);
  --radius-sm:10px;--radius-md:14px;--radius-lg:18px;
  --red:#e74c3c;--red-bg:#fdecea;
  --orange:#e67e22;--orange-bg:#fef3e2;
  --green:#1e8449;--green-bg:#eafaf1;
  --purple:#6c3483;--purple-bg:#f4ecfd;
  --teal:#0e6655;--teal-bg:#e8f8f5;
  --pink:#943672;--pink-bg:#fdf2f8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Pretendard",-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(145deg,#eaeff8 0%,var(--bg) 60%,#e8edf7 100%);color:var(--text-primary);font-size:14px;min-height:100vh}
.wrap{max-width:1280px;margin:0 auto;padding:24px 20px}

/* 헤더 */
.header-card{background:linear-gradient(135deg,var(--blue-900) 0%,var(--blue-700) 100%);border-radius:var(--radius-lg);padding:28px 32px;margin-bottom:20px;box-shadow:0 8px 32px rgba(30,58,138,0.22);position:relative;overflow:hidden;color:#fff}
.header-card::after{content:'';position:absolute;top:-80px;right:-80px;width:260px;height:260px;background:radial-gradient(circle,rgba(255,255,255,0.07) 0%,transparent 65%);pointer-events:none}
#logTitle{font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.3px}
#logSub{font-size:12px;color:rgba(255,255,255,0.65);margin-top:4px;font-weight:500}
#chipsetLine{font-size:13px;font-weight:700;color:#93c5fd;margin-top:4px}

/* 버튼 */
.btn{padding:8px 16px;border:1.5px solid rgba(255,255,255,0.25);border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.9);transition:all .18s;font-family:inherit}
.btn:hover{background:rgba(255,255,255,0.22);border-color:rgba(255,255,255,0.45)}
.btn-p{background:rgba(255,255,255,0.9);color:var(--blue-800);border-color:transparent}
.btn-p:hover{background:#fff}
.tab-content .btn{background:var(--surface);color:var(--text-secondary);border:1px solid var(--border)}
.tab-content .btn:hover{background:var(--blue-50);color:var(--blue-700);border-color:var(--blue-400)}
.tab-content .btn-p{background:var(--blue-700);color:#fff;border-color:var(--blue-700)}
.tab-content .btn-p:hover{background:var(--blue-800)}

/* 업로드 박스 */
.upload-box{border:2px dashed rgba(255,255,255,0.3);border-radius:var(--radius-md);padding:2rem 1.5rem;margin-top:1.25rem;background:rgba(255,255,255,0.07);text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
.upload-box:hover,.upload-box.drag{border-color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.13)}
.upload-box input[type=file]{display:none}
.upload-box .up-icon{font-size:30px;margin-bottom:8px;opacity:.7}
.upload-box .up-label{font-size:13px;color:rgba(255,255,255,0.85);font-weight:600;margin-bottom:4px}
.upload-box .up-hint{font-size:11px;color:rgba(255,255,255,0.5)}

/* 탭바 */
.tab-bar{display:flex;gap:4px;background:var(--surface);border-radius:var(--radius-md) var(--radius-md) 0 0;padding:10px 16px 0;border:1px solid var(--border);border-bottom:none;flex-wrap:wrap}
.tab{padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-secondary);border:none;background:transparent;border-bottom:3px solid transparent;margin-bottom:-1px;border-radius:var(--radius-sm) var(--radius-sm) 0 0;transition:all .18s;font-family:inherit}
.tab:hover{color:var(--blue-700);background:var(--blue-50)}
.tab.active{color:var(--blue-800);border-bottom-color:var(--blue-600)}

/* 탭 컨텐츠 */
.tab-content{background:var(--surface);border:1px solid var(--border);border-radius:0 0 var(--radius-md) var(--radius-md);padding:24px 28px;box-shadow:var(--shadow-md)}

/* 섹션 레이블 */
.st{font-size:13px;font-weight:700;color:var(--blue-800);letter-spacing:.04em;text-transform:uppercase;margin-bottom:12px;margin-top:1.5rem;display:flex;align-items:center;gap:7px}
.st:first-child{margin-top:0}
.st::before{content:'';display:inline-block;width:4px;height:14px;border-radius:3px;background:var(--blue-600);flex-shrink:0}

/* 메트릭 카드 */
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:4px}
.mc{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--blue-100);border-radius:var(--radius-sm);padding:14px 16px;box-shadow:var(--shadow-sm);transition:box-shadow .18s,border-left-color .18s}
.mc:hover{box-shadow:var(--shadow-md)}
.ml{font-size:13px;color:var(--text-secondary);font-weight:700;margin-bottom:6px;letter-spacing:.02em}
.mv{font-size:19px;font-weight:800;color:var(--text-primary);line-height:1.2}
.ms{font-size:11px;color:#94a3b8;margin-top:4px;font-weight:500}
.danger{border-left:4px solid var(--red)}.danger .mv{color:var(--red)}
.warn{border-left:4px solid var(--orange)}.warn .mv{color:var(--orange)}

/* 일별 상세 카드 */
.daily-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:14px;box-shadow:var(--shadow-sm);overflow:hidden}
.daily-hdr{background:linear-gradient(135deg,var(--blue-800) 0%,var(--blue-700) 100%);color:#fff;font-size:15px;font-weight:800;padding:10px 18px;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.daily-hdr::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.55)}
.daily-body{padding:16px 18px}

/* 구분선 */
.divider{border:none;border-top:1px solid var(--border);margin:1.5rem 0}

/* 알림 카드 */
.nc{border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 18px;margin-bottom:10px;background:var(--surface);box-shadow:var(--shadow-sm)}
.nc.issue{border-left:4px solid var(--red)}.nc.weak_sig{border-left:4px solid var(--orange)}
.nc.inter{border-left:4px solid var(--purple)}.nc.high_bler{border-left:4px solid var(--blue-700)}.nc.antdiff{border-left:4px solid #16a085}.nc.mic{border-left:4px solid var(--red)}
.nt{font-size:13px;font-weight:700;color:var(--text-primary)}
.ns{font-size:12px;color:var(--text-secondary);margin-top:5px;font-weight:500}
.ntags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}

/* 뱃지/태그 */
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700}
.feat-tip{cursor:default}
.tag{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.tr{background:var(--red-bg);color:var(--red)}
.ta{background:var(--orange-bg);color:var(--orange)}
.tb{background:var(--blue-100);color:var(--blue-800)}
.tp{background:var(--purple-bg);color:var(--purple)}
.tg{background:#f1f5f9;color:#475569}
.tgr{background:var(--green-bg);color:var(--green)}
.ttl{background:var(--teal-bg);color:var(--teal)}
.tpk{background:var(--pink-bg);color:var(--pink)}

/* 테이블 */
.tw{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border);box-shadow:var(--shadow-sm)}
#tab-raw .tw{overflow-x:hidden}
#tab-raw table{table-layout:fixed;width:100%}
#tab-raw tbody td{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:5px 6px;font-size:11px}
#tab-raw tbody td:last-child{overflow:visible;padding:2px 4px 2px 2px;text-align:center}
#tab-raw thead th{padding:8px 6px;font-size:11px}
table{border-collapse:collapse;font-size:13px;width:100%}
thead th{background:var(--blue-800);padding:10px 13px;text-align:left;font-weight:700;font-size:12px;color:rgba(255,255,255,0.92);white-space:nowrap}
#stHead th,#stBody td{text-align:center}
#stBody td:nth-child(n+3):nth-child(-n+8){background:rgba(37,79,153,0.04)}
#stBody td:nth-child(n+9):nth-child(-n+12){background:rgba(22,69,94,0.05)}
#stBody td:nth-child(n+13){background:rgba(21,64,64,0.05)}
#stBody tr:nth-child(even) td:nth-child(n+3):nth-child(-n+8){background:rgba(37,79,153,0.09)}
#stBody tr:nth-child(even) td:nth-child(n+9):nth-child(-n+12){background:rgba(22,69,94,0.10)}
#stBody tr:nth-child(even) td:nth-child(n+13){background:rgba(21,64,64,0.10)}
tbody tr{border-bottom:1px solid #f1f5f9}
tbody tr:last-child{border-bottom:none}
tbody tr:nth-child(even){background:var(--blue-50)}
tbody tr:hover{background:#e5eeff}
tbody td{padding:9px 13px;color:var(--text-primary);font-size:12px;white-space:nowrap;font-weight:500}
.th-sort{cursor:pointer;user-select:none}
.th-sort:hover{background:var(--blue-700)}
.th-sort.asc::after{content:' ↑';color:#93c5fd}
.th-sort.desc::after{content:' ↓';color:#93c5fd}

/* 랭킹 */
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:11px;font-weight:700;background:#f1f5f9;color:var(--text-secondary)}
.rank-badge.r1{background:linear-gradient(135deg,#f6d365,#fda085);color:#7a4f00}
.rank-badge.r2{background:linear-gradient(135deg,#d4d4d4,#a0a0a0);color:#333}
.rank-badge.r3{background:linear-gradient(135deg,#cd7f32,#a0522d);color:#fff}

/* 카테고리 박스 */
.cat-box{border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 20px;margin-bottom:12px;background:var(--surface);box-shadow:var(--shadow-sm)}
.cat-title{font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.bar-label{font-size:12px;color:var(--text-secondary);width:150px;flex-shrink:0;font-weight:600}
.bar-track{flex:1;background:var(--blue-50);border-radius:6px;height:14px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .4s}
.bar-val{font-size:12px;font-weight:600;color:var(--text-primary);min-width:200px;flex-shrink:0}
.ecnt-high{color:var(--red);font-weight:700}
/* day cards */
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-sm)}
.day-hdr{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:9px 16px;background:var(--blue-50);border-bottom:1px solid var(--blue-100)}
.day-dt{font-size:13px;font-weight:800;color:var(--blue-800);letter-spacing:-.01em;flex-shrink:0}
.day-body{padding:0}
.day-row{display:flex;align-items:center;padding:7px 16px;border-bottom:1px solid var(--blue-50);border-left:3px solid transparent}
.day-row:last-child{border-bottom:none}
.day-key{font-size:10px;font-weight:800;color:var(--blue-600);width:52px;flex-shrink:0}
.day-lbl{font-size:12px;color:var(--text-secondary);width:160px;flex-shrink:0}
.day-cnt{font-size:13px;font-weight:700;color:var(--text-primary);width:52px;text-align:left;flex-shrink:0}
.day-sub{font-size:11px;color:#94a3b8;margin-left:14px}

/* detail row */
.detail-row td{padding:0!important}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:4px 16px;padding:12px 18px;background:var(--blue-50);border-top:1px solid var(--blue-100)}
.detail-kv{font-size:11px;display:flex;gap:5px;align-items:baseline;min-width:0}
.detail-k{color:var(--text-secondary);flex-shrink:0;font-weight:600}
.detail-v{color:var(--text-primary);font-weight:700;word-break:break-all;min-width:0;overflow-wrap:anywhere}
.det-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 7px;color:var(--text-secondary);border-radius:4px;transition:all .15s}
.det-btn:hover{background:var(--blue-50);color:var(--blue-700)}

/* input/select */
input[type=text],select{padding:8px 12px;font-size:13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text-primary);outline:none;font-family:inherit;font-weight:500;transition:border-color .18s}
input[type=text]:focus,select:focus{border-color:var(--blue-500)}

.no-data{text-align:center;padding:2.5rem;color:#94a3b8;font-size:13px;font-weight:600}
/* 인사이트 */
.insight-list{display:flex;flex-direction:column;gap:5px;margin-bottom:18px}
.insight-item{display:flex;align-items:flex-start;gap:10px;font-size:12.5px;padding:8px 12px;border-radius:6px;line-height:1.55;border-left:3px solid transparent}
.i-danger{background:#fff0f0;border-left-color:#c0392b;color:#7b241c}
.i-warn{background:#fff8ef;border-left-color:#e67e22;color:#7d4100}
.i-info{background:#eef4ff;border-left-color:#2980b9;color:#1a4870}
.i-good{background:#f0faf3;border-left-color:#1e8449;color:#1a5235}
.i-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;margin-top:5px}
/* 타임라인 */
#tlWrap{border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);margin-bottom:10px;overflow:hidden}
.tl-head{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--blue-50);border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--text-primary);cursor:pointer}
.tl-body{padding:8px 12px 10px;overflow-x:auto}
.tl-row{display:flex;align-items:center;height:22px}
.tl-label{width:52px;font-size:10px;font-weight:700;flex-shrink:0;padding-right:4px;text-align:right}
.tl-track{flex:1;position:relative;height:22px;border-bottom:1px solid #f0f0f0}
.tl-dot{position:absolute;width:8px;height:8px;border-radius:50%;transform:translateX(-50%);cursor:default;top:7px;opacity:.8;transition:opacity .1s}
.tl-dot:hover{opacity:1;z-index:2}
.tl-sep{position:absolute;top:0;bottom:0;border-left:1px dashed #d0d5dd;pointer-events:none}
.tl-daylbl{position:absolute;top:-17px;font-size:9px;color:#94a3b8;transform:translateX(-50%);white-space:nowrap}
.tl-axis{position:relative;height:16px;margin-left:52px}
</style>
</head>
<body>
<div class="wrap">
<div class="header-card">
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div style="flex:1;min-width:200px">
      <div style="font-size:20px;font-weight:700;color:#fff;letter-spacing:-.02em" id="logTitle">CpGdDqaLog Analyzer</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.75);font-weight:600;margin-top:3px" id="logPart">SQE2 Global 필드검증파트</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.55);margin-top:3px" id="logSub">.LOG 파일을 업로드하여 분석을 시작하세요</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.85);margin-top:4px;display:none" id="modelVerLine"></div>
      <div style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.9);margin-top:4px" id="chipsetLine" style="display:none"></div>
    </div>
    <button class="btn btn-p" onclick="document.getElementById('fileInput').click()">LOG / CSV 파일 열기</button>
    <button class="btn" onclick="pasteFromClipboard()" title="Superset 클립보드 붙여넣기"><i class="fa fa-clipboard"></i> Superset 클립보드 붙여넣기</button>
    <button class="btn" onclick="loadSample()">샘플 데이터</button>
    <button class="btn" id="resetBtn" onclick="resetAll()" style="display:none">다시 로드</button>
  </div>
  <div class="upload-box" id="uploadBox" onclick="document.getElementById('fileInput').click()"
       ondragover="event.preventDefault();this.classList.add('drag')"
       ondragleave="this.classList.remove('drag')"
       ondrop="event.preventDefault();this.classList.remove('drag');handleFile(event.dataTransfer.files[0])">
    <input type="file" id="fileInput" accept=".log,.LOG,.txt,.csv,.CSV" onchange="handleFile(this.files[0])">
    <div class="up-icon">📂</div>
    <div class="up-label">.LOG / .CSV 파일을 클릭하거나 드래그하세요</div>
    <div class="up-hint">.LOG (JSON 스타일) · .CSV (Date, Time, feature, custom_value 컬럼 포함)</div>
  </div>
</div>

<div id="dashboard" style="display:none">
  <div class="tab-bar">
    <button class="tab active" onclick="showTab('overview')">전체 요약</button>
    <button class="tab" onclick="showTab('station')">문제 기지국</button>
    <button class="tab" onclick="showTab('mute')">MUTE 분석</button>
    <button class="tab" onclick="showTab('drop')">DROP 분석</button>
    <button class="tab" onclick="showTab('daily')">일별 상세</button>
    <button class="tab" onclick="showTab('trend')">추이 그래프</button>
    <button class="tab" onclick="showTab('raw')">원본 데이터</button>
  </div>
  <div class="tab-content">
    <div id="tab-overview">
      <div id="insightContent"></div>
      <div class="st">통화 품질</div><div class="mg" id="callM"></div>
      <div class="st">무선 품질</div><div class="mg" id="radioM"></div>
      <div class="st">망등록 이슈</div><div class="mg" id="regiM"></div>
      <div class="st">단말 / 기타</div><div class="mg" id="devM"></div>
    </div>
    <div id="tab-station" style="display:none">
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
        <input type="text" id="stTac" placeholder="TAC" oninput="renderStationTable()" style="width:90px">
        <input type="text" id="stPci" placeholder="PCI" oninput="renderStationTable()" style="width:90px">
        <input type="text" id="stBand" placeholder="Band" oninput="renderStationTable()" style="width:90px">
        <select id="stFilter" onchange="renderStationTable()">
          <option value="">전체</option><option value="issue">이슈집중</option>
          <option value="weak_sig">신호세기미약</option><option value="inter">셀중첩간섭</option>
          <option value="high_bler">HighBLER</option><option value="normal">양호</option>
          <option value="antdiff">Ant Diff</option>
        </select>
        <button class="btn" onclick="exportTop3Stations('csv')" title="상위 3개 기지국 CSV 저장"><i class="fa fa-download"></i> CSV 저장</button>
        <button class="btn" onclick="exportTop3Stations('copy')" title="상위 3개 기지국 클립보드 복사"><i class="fa fa-copy"></i> 클립보드 복사</button>
      </div>
      <div class="tw"><table><thead id="stHead"></thead><tbody id="stBody"></tbody></table></div>
      <div style="font-size:12px;color:#aaa;margin-top:8px" id="stCount"></div>
    </div>
    <div id="tab-mute" style="display:none"><div id="muteContent"></div></div>
    <div id="tab-drop" style="display:none"><div id="dropContent"></div></div>
    <div id="tab-daily" style="display:none"><div id="dailyContent"></div></div>
    <div id="tab-trend" style="display:none"><div id="trendContent"></div></div>
    <div id="tab-raw" style="display:none">
      <div id="tlWrap" style="display:none">
        <div class="tl-head" onclick="toggleTimeline()">
          <span>📈 이벤트 타임라인</span><span id="tlChevron">▼</span>
        </div>
        <div id="tlBody" class="tl-body" style="display:none"><div id="tlInner"></div></div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center">
        <input type="text" id="rawSearch" placeholder="검색..." oninput="filterRaw()" style="flex:1;min-width:120px">
        <input type="date" id="rawDateFrom" onchange="filterRaw()" title="시작일">
        <span style="color:var(--text-secondary);font-size:12px">~</span>

function pasteFromClipboard(){
  if(!navigator.clipboard||!navigator.clipboard.readText){alert('이 브라우저에서는 클립보드 접근이 지원되지 않습니다.');return;}
  navigator.clipboard.readText().then(text=>{
    if(!text||!text.trim()){alert('클립보드가 비어있습니다.');return;}
    doParse(text,'clipboard');
  }).catch(()=>alert('클립보드 접근 권한이 필요합니다.\n브라우저 주소창 왼쪽 자물쇠 아이콘에서 허용해주세요.'));
}
function handleFile(file){
  if(!file)return;
  if(!/\.(log|txt|csv)$/i.test(file.name)){alert('.LOG, .TXT, .CSV 파일만 업로드할 수 있습니다.');return;}
  const tryParse=(encoding)=>new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      let text=e.target.result;
      if(text.charCodeAt(0)===0xFEFF)text=text.slice(1); // BOM 제거
      res(text);
    };
    reader.onerror=rej;
    reader.readAsText(file,encoding);
  });
  tryParse('utf-8').then(text=>{
    const rows=text.split('\n').filter(l=>l.trim()).map(parseLine).filter(Boolean);
    if(rows.length>0){doParse(text,file.name);return;}
    // UTF-8 파싱 실패 시 EUC-KR 재시도
    return tryParse('euc-kr').then(text2=>doParse(text2,file.name));
  }).catch(()=>alert('파일을 읽을 수 없습니다.'));
}

function parseLine(line){
  line=line.replace(/\r/g,'');
  if(!line.trim())return null;
  const tabs=line.split('\t');
  let date,time,feature,jsonStr;
  if(tabs.length>=3){
    // 형식: "DATE TIME\tFEATURE\t{JSON}"
    const dt=tabs[0].trim().split(/\s+/);
    if(dt.length<2)return null;
    date=dt[0];time=dt[1];
    feature=tabs[1].trim().toUpperCase();
    jsonStr=tabs.slice(2).join('\t').trim();
  } else if(tabs.length===2){
    // 형식: "DATE TIME FEATURE\t{JSON}"
    const preParts=tabs[0].trim().split(/\s+/);
    if(preParts.length<3)return null;
    date=preParts[0];time=preParts[1];
    feature=preParts.slice(2).join(' ').toUpperCase();
    jsonStr=tabs[1].trim();
  } else {
    // 탭 없음 — { 위치 기준으로 분리
    const bi=line.indexOf('{');if(bi===-1)return null;
    const preParts=line.slice(0,bi).trim().split(/\s+/);
    if(preParts.length<3)return null;
    date=preParts[0];time=preParts[1];
    feature=preParts.slice(2).join(' ').toUpperCase();
    jsonStr=line.slice(bi).trim();
  }
  feature=feature.replace(/[^A-Z0-9]/g,'');
  if(!date||!time||!feature||!jsonStr)return null;
  let obj={};try{obj=JSON.parse(jsonStr);}catch{return null;}
  return{Date:date,Time:time,...obj,Feature:feature};
}
function splitCSVRow(line,sep){
  if(sep==='\t')return line.split('\t');
  const res=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===sep&&!inQ){res.push(cur);cur='';}
    else cur+=c;
  }
  res.push(cur);
  return res;
}
function parseCSV(text){
  const lines=text.split('\n').map(l=>l.replace(/\r$/,'')).filter(l=>l.trim());
  if(lines.length<2)return[];
  const firstLine=lines[0].replace(/^﻿/,'');
  const sep=firstLine.includes('\t')?'\t':',';
  const headers=splitCSVRow(firstLine,sep).map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  const idx={
    date:  headers.findIndex(h=>h==='date'),
    time:  headers.findIndex(h=>h==='time'),
    genTs: headers.findIndex(h=>h==='generation_timestamp'),
    feat:  headers.findIndex(h=>h==='feature'||h==='feat'||h==='feature_name'),
    val:   headers.findIndex(h=>h==='custom_value'||h==='value'||h==='json'||h==='data'),
    modelId: headers.findIndex(h=>h==='model_id'||h==='modelid'||h==='model'),
    swVer:   headers.findIndex(h=>h==='sw_ver'||h==='swver'||h==='sw_version'||h==='software_version')
  };
  const hasDatetime=(idx.date>=0&&idx.time>=0)||idx.genTs>=0;
  if(!hasDatetime||idx.feat<0||idx.val<0)return[];
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const parts=splitCSVRow(lines[i],sep);
    let date,time;
    if(idx.date>=0&&idx.time>=0){
      date=(parts[idx.date]||'').trim().replace(/^"|"$/g,'');
      time=(parts[idx.time]||'').trim().replace(/^"|"$/g,'');
    } else {
      const ts=(parts[idx.genTs]||'').trim().replace(/^"|"$/g,'');
      // format: 2025-04-13 07:46:41.958 +0900
      const m=ts.match(/^(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2}:\d{2})/);
      date=m?m[1]:'';
      time=m?m[2]:'';
    }
    const feat=(parts[idx.feat]||'').trim().replace(/^"|"$/g,'').toUpperCase().replace(/[^A-Z0-9]/g,'');
    let jsonStr=(parts[idx.val]||'').trim().replace(/^"|"$/g,'');
    if(!date||!time||!feat||!jsonStr)continue;
    let obj={};try{obj=JSON.parse(jsonStr);}catch{continue;}
    const extra={};
    if(idx.modelId>=0){const v=(parts[idx.modelId]||'').trim().replace(/^"|"$/g,'');if(v)extra.model_id=v;}
    if(idx.swVer>=0){const v=(parts[idx.swVer]||'').trim().replace(/^"|"$/g,'');if(v)extra.sw_ver=v;}
    rows.push({Date:date,Time:time,...obj,...extra,Feature:feat});
  }
  return rows;
}
function doParse(text,filename){

  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  // LOG 형식 시도, 실패 시 CSV 시도
  let rows=text.split('\n').filter(l=>l.trim()).map(parseLine).filter(Boolean);
  if(!rows.length)rows=parseCSV(text);
  allRows=rows;
  if(!allRows.length){
    alert('파싱 실패. 지원 형식을 확인해주세요.\n\n[LOG] 날짜 시간 Feature{TAB}{JSON}\n[CSV] Date,Time,feature,custom_value 컬럼 포함');
    return;
  }
  const ks=new Set();allRows.forEach(r=>Object.keys(r).forEach(k=>ks.add(k)));
  allCols=['Date','Time','Feature',...[...ks].filter(k=>!['Date','Time','Feature'].includes(k))];
  buildRlfEvents();
  buildStationMap();
  annotateSIMD();
  document.getElementById('uploadBox').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('resetBtn').style.display='';

  stSortCol='default';stSortDir='desc';rawOpenIdx=new Set();
  renderHeader(filename);renderInsights();renderOverview();renderMuteTab();renderDropTab();renderDaily();
  tlOpen=false;const tlW=document.getElementById('tlWrap');if(tlW)tlW.style.display='block';
  const tlB=document.getElementById('tlBody');if(tlB)tlB.style.display='none';
  const tlC=document.getElementById('tlChevron');if(tlC)tlC.textContent='▼';
  initRaw();
  showTab('overview');
}
function getDates(){return[...new Set(allRows.map(r=>r.Date))].sort();}
function byDate(d){return allRows.filter(r=>r.Date===d);}
function byFeat(f,rows){return(rows||allRows).filter(r=>r.Feature===f);}
function cnt(f,rows){return byFeat(f,rows).length;}
function pct(n,d){return d===0?'0.0':((n/d)*100).toFixed(1);}
function fNum(v){const n=parseFloat(v);return isNaN(n)?null:n;}
function avgArr(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;}
function isOne(v){return v==='1'||v===1;}
function getCellKey(tac,pid,dch,lbnd){
  if(!tac&&!pid&&!dch&&!lbnd)return null;
  const b=BAND_MAP[String(dch||'')];
  const keyBand=b!=null?String(b):(lbnd||dch||'?');
  return`${tac||'?'}|${pid||'?'}|${keyBand}`;
}

function buildRlfEvents(){
  allRlfEvents=[];rlfByRlfi={};
  byFeat('RLFI').forEach(r=>{
    const [yr,mo]=r.Date.split('-');
    const rlfiKey=`${r.Date}|${r.Time}`;
    rlfByRlfi[rlfiKey]=[];
    for(let i=1;i<=4;i++){
      const tac=r[`TAC${i}`],pid=r[`PID${i}`],dch=r[`DCh${i}`];
      if(!tac||!pid||!dch)continue;
      const tim=(r[`TIM${i}`]||'').trim();
      let date=r.Date,time=r.Time,timeCorrected=false;
      if(tim.includes(',')){
        const ci=tim.indexOf(',');
        const dayStr=tim.slice(0,ci).trim(),timeStr=tim.slice(ci+1).trim();
        if(dayStr&&timeStr){date=`${yr}-${mo}-${dayStr.padStart(2,'0')}`;time=timeStr;timeCorrected=true;}
      }
      const evt={Date:date,Time:time,Feature:'RLF',_rlfiKey:rlfiKey,_slot:i,_timeCorrected:timeCorrected,
        TAC_:tac,PhID:pid,DLCh:dch,RxP0:r[`RxP${i}`],PLMN:r[`PLM${i}`]};
      // 슬롯 전용 필드 복사 (TIM, ACT 등)
      Object.keys(r).forEach(k=>{
        if(!/\d$/.test(k)||k.slice(-1)!==String(i))return;
        const base=k.slice(0,-1);
        if(!['TAC','PID','DCh','RxP','PLM'].includes(base))evt[base]=r[k];
      });
      allRlfEvents.push(evt);
      rlfByRlfi[rlfiKey].push(evt);
    }
  });
}
function buildStationMap(){
  stationMap={};
  const ensure=key=>{if(!stationMap[key])stationMap[key]={key,tac:'',pid:'',dch:'',lbnd:'',band:'',drops:[],mutes:[],nonMicMutes:[],rlfis:[],cends:[],dropRsrp:[],dropSinr:[],muteRsrp:[],muteSinr:[],muteBler:[],rlfiRsrp:[],antDiffDrops:[]};};
  allRows.forEach(r=>{
    const f=r.Feature;
    if(['CEND','DROP','MUTE'].includes(f)){
      const key=f==='MUTE'?getCellKey(r.TAC_,r.PhID,r.DLCh,r.LBND):getCellKey(r.TAC_,r.PhID,r.DLCh);
      if(!key)return;
      ensure(key);const s=stationMap[key];
      s.tac=r.TAC_||s.tac;s.pid=r.PhID||s.pid;s.dch=r.DLCh||s.dch;
      if(f==='CEND')s.cends.push(r);
      if(f==='DROP'){
        s.drops.push(r);
        const rsrp=getDropRSRP(r),sinr=getDropSINR(r);
        if(rsrp!==null)s.dropRsrp.push(rsrp);if(sinr!==null)s.dropSinr.push(sinr);
        const r0=fNum(r.RxP0),r1=fNum(r.RxP1);
        if(r0!==null&&r1!==null&&Math.abs(r0-r1)>=20)s.antDiffDrops.push({...r,diff:Math.abs(r0-r1)});
      }
      if(f==='MUTE'){
        s.mutes.push(r);
        if(r.LBND)s.lbnd=r.LBND;
        const isMicOnly=['SAMS','MCST','SMBU','TXSF'].some(k=>parseInt(r[k]||0,10)>0||r[k]==='1'||r[k]===1);
        const hasSoundMute=SOUND_TYPES.some(t=>r[t.key]==='1'||r[t.key]===1);
        if(hasSoundMute||!isMicOnly)s.nonMicMutes.push(r);
        const rsrp=fNum(r.RSRP),sinr=fNum(r.CINR),bler=fNum(r.BLER);
        if(rsrp!==null)s.muteRsrp.push(rsrp);if(sinr!==null)s.muteSinr.push(sinr);if(bler!==null&&bler>0)s.muteBler.push(bler);
      }
    }
  });
  // RLFI → 개별 RLF 이벤트로 스테이션 맵에 반영
  allRlfEvents.forEach(e=>{
    const key=getCellKey(e.TAC_,e.PhID,e.DLCh);if(!key)return;
    ensure(key);const s=stationMap[key];
    s.tac=e.TAC_;s.pid=e.PhID;s.dch=e.DLCh;
    s.rlfis.push(e);
    const rxp=fNum(e.RxP0);if(rxp!==null)s.rlfiRsrp.push(rxp);
  });
  Object.values(stationMap).forEach(s=>{
    const bNum=BAND_MAP[String(s.dch)];s.band=bNum!=null?String(bNum):(s.lbnd||s.dch||'');
    const totalRef=s.cends.length+s.drops.length;
    s.probCount=s.drops.length+s.nonMicMutes.length+s.rlfis.length;
    s.dropRate=totalRef>0?(s.drops.length/totalRef*100):0;
    s.problemRate=totalRef>0?((s.drops.length+s.nonMicMutes.length)/totalRef*100):0;
    const allRsrp=[...s.dropRsrp,...s.muteRsrp,...s.rlfiRsrp];
    const allSinr=[...s.dropSinr,...s.muteSinr];
    s.avgRsrp=allRsrp.length?parseFloat(avgArr(allRsrp).toFixed(1)):null;
    s.avgSinr=allSinr.length?parseFloat(avgArr(allSinr).toFixed(1)):null;
    s.avgBler=s.muteBler.length?parseFloat(avgArr(s.muteBler).toFixed(1)):null;
    s.weakRsrp=s.avgRsrp!==null&&s.avgRsrp<=-100;
    s.weakSinr=s.avgSinr!==null&&s.avgSinr<0;
    s.isWeak=s.weakRsrp||s.weakSinr;
    s.hasAntDiff=s.antDiffDrops.length>=2;
    s.score=s.drops.length*10+s.nonMicMutes.length*2+s.rlfis.length;
    if(s.weakRsrp)s.level='weak_sig';
    else if(s.weakSinr)s.level='inter';
    else if(s.avgBler!==null&&s.avgBler>=40)s.level='high_bler';
    else if(s.probCount>=3)s.level='issue';
    else s.level='normal';
  });
}
function getOperator(){
  const cnt={};
  allRows.forEach(r=>{const p=(r.PLMN||'').replace(/[^0-9]/g,'');if(PLMN_OP[p])cnt[p]=(cnt[p]||0)+1;});
  allRlfEvents.forEach(e=>{const p=(e.PLMN||'').replace(/[^0-9]/g,'');if(PLMN_OP[p])cnt[p]=(cnt[p]||0)+1;});
  const top=Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0];
  return top?PLMN_OP[top[0]]||'':'';
}

function annotateSIMD(){
  const EXCL=new Set(['Date','Time','Feature','TR1D','NS1D']);
  const dates=getDates();
  let prevSnap=null;
  dates.forEach(d=>{
    const simdRows=byFeat('SIMD',byDate(d));
    if(!simdRows.length)return;
    const snap={};
    simdRows.forEach(r=>Object.entries(r).forEach(([k,v])=>{if(!EXCL.has(k)&&v!==''&&v!==null&&v!==undefined)snap[k]=String(v);}));
    if(prevSnap!==null){
      const allKeys=new Set([...Object.keys(snap),...Object.keys(prevSnap)]);
      const diffs=[];
      allKeys.forEach(k=>{const cv=snap[k]??'';const pv=prevSnap[k]??'';if(cv!==pv)diffs.push(`${k}: ${pv||'-'}→${cv||'-'}`);});
      if(diffs.length)simdRows.forEach(r=>r._simdDiff=diffs);
    }
    prevSnap=snap;
  });
}

function renderInsights(){

    const sigTxt=(avgRsrpTxt||avgSinrTxt)?` [평균 전계:${avgRsrpTxt}${avgSinrTxt}]`:'';
    const typeCnt={};
    SOUND_TYPES.forEach(t=>{const n=muteRows.filter(r=>r[t.key]==='1'||r[t.key]===1).length;if(n>0)typeCnt[t.key]=n;});
    const typeTotal=Object.values(typeCnt).reduce((s,n)=>s+n,0);
    let causeTxt='';
    if(typeTotal>0){
      const [topT,topN]=Object.entries(typeCnt).sort((a,b)=>b[1]-a[1])[0];
      const pct=Math.round(topN/typeTotal*100);
      const lblM={RSMT:'RSMT (Short Mute)',RNMT:'RNMT (수신없음)',DBMT:'DBMT (DL BLER)',UBMT:'UBMT (UL BLER)'};
      if(pct>=60)causeTxt=` — 주요 원인 ${pct}%: ${lblM[topT]||topT} (${topT.startsWith('R')?'수신측 집중':'HighBLER 확인필요'})`;
    }
    const lv=parseFloat(muteRate)>=10?'warn':'info';
    items.push({lv,t:`MUTE ${muteRows.length}건 (MUTE율 ${muteRate}%)${sigTxt}${causeTxt}`});
  }
  // 8. 마이크이상 이벤트
  const micMuteCnt=muteRows.filter(r=>['SAMS','MCST','SMBU'].some(k=>r[k]==='1'||parseInt(r[k]||0,10)>0)).length;
  if(micMuteCnt>=3){
    const micPct=(muteRows.length>0?(micMuteCnt/muteRows.length*100).toFixed(1):'?');
    items.push({lv:'warn',t:`마이크이상(SAMS/MCST/SMBU) 이벤트 ${micMuteCnt}건 (${micPct}%, 총 통화횟수 ${totalCall}건) — 단말 마이크 점검 필요`});
  }
  // 9. ATTI / ATTF / PDPI / PDPF 다수 발생
  const attiCnt=byFeat('ATTI').length,attfCnt=byFeat('ATTF').length;
  const pdpiCnt=byFeat('PDPI').length,pdpfCnt=byFeat('PDPF').length;
  if(attfCnt>=3||attiCnt>=3){
    const parts=[];
    if(attfCnt>=3)parts.push(`ATTF ${attfCnt}건`);
    if(attiCnt>=3)parts.push(`ATTI ${attiCnt}건`);
    items.push({lv:attfCnt>=5||attiCnt>=5?'danger':'warn',t:`LTE Attach 오류 다수 — ${parts.join(' / ')} — 네트워크 등록 문제 확인 필요`});
  }
  if(pdpfCnt>=3||pdpiCnt>=3){
    const parts=[];
    if(pdpfCnt>=3)parts.push(`PDPF ${pdpfCnt}건`);
    if(pdpiCnt>=3)parts.push(`PDPI ${pdpiCnt}건`);
    items.push({lv:pdpfCnt>=5||pdpiCnt>=5?'danger':'warn',t:`PDP 연결 오류 다수 — ${parts.join(' / ')} — 데이터 접속 장애 확인 필요`});
  }
  // 12. 특정 오디오 기기 연결 시 이벤트 집중 (MUTE: PATH, DROP: AUST) — 전체 대비 50% 이상일 때만
  {
    const mutePaths=muteRows.map(r=>String(r.PATH??'').trim()).filter(p=>PATH_LBL[p]);
    if(mutePaths.length>=3){
      const topP=topVal(mutePaths);
      const topN=mutePaths.filter(p=>p===topP).length;
      const dispPct=Math.round(topN/muteRows.length*100);
      if(topN/mutePaths.length>=0.7&&topN>=3&&dispPct>=50)
        items.push({lv:'info',t:`MUTE ${topN}건이 ${PATH_LBL[topP]} 연결 시 발생 (전체 ${muteRows.length}건 중 ${dispPct}%) — 해당 기기 연결 조건 점검`});
    }
    const dropRows=byFeat('DROP');
    const dropPaths=dropRows.map(r=>String(r.AUST??'').trim()).filter(p=>PATH_LBL[p]);
    if(dropPaths.length>=3){
      const topP=topVal(dropPaths);
      const topN=dropPaths.filter(p=>p===topP).length;
      const dispPct=Math.round(topN/dropRows.length*100);
      if(topN/dropPaths.length>=0.7&&topN>=3&&dispPct>=50)
        items.push({lv:'warn',t:`DROP ${topN}건이 ${PATH_LBL[topP]} 연결 시 발생 (전체 ${dropRows.length}건 중 ${dispPct}%) — 해당 기기 연결 조건 점검`});
    }
  }
  // 11. 전체 RSRP / SINR
  const allRsrp=stList.filter(s=>s.avgRsrp!==null).map(s=>s.avgRsrp);
  const allSinr=stList.filter(s=>s.avgSinr!==null).map(s=>s.avgSinr);
  if(allRsrp.length){const v=parseFloat(avgArr(allRsrp).toFixed(1));if(v<=-105)items.push({lv:'danger',t:`전체 평균 RSRP ${v} dBm — 극심한 약전계 구간 포함`});else if(v<=-100)items.push({lv:'warn',t:`전체 평균 RSRP ${v} dBm — 약전계 구간 다수`});}
  if(allSinr.length){const v=parseFloat(avgArr(allSinr).toFixed(1));if(v<-3)items.push({lv:'warn',t:`전체 평균 SINR ${v} dB — 셀 간섭 또는 신호 열화 지속`});}
  // 12. DROP 집중일
  if(dates.length>1){
    const dayD=dates.map(d=>({d,n:byFeat('DROP',byDate(d)).length})).filter(x=>x.n>0);
    if(dayD.length>0){
      dayD.sort((a,b)=>b.n-a.n);
      const avg=dayD.reduce((s,x)=>s+x.n,0)/dates.length;
      const w=dayD[0];
      if(w.n>=3&&w.n>=avg*2.2){
        const [,mo,dy]=w.d.split('-');
        const dateStr=`${parseInt(mo)}/${parseInt(dy)}일`;
        items.push({lv:'info',t:`Calldrop 이벤트가 ${dateStr}에 집중(${w.n}건) — 평균 ${avg.toFixed(1)}건 대비 최다 발생`});
      }
    }
  }
  // 13. 3G 통화 이력 (ACT_=2)
  const callRows=[...byFeat('CEND'),...byFeat('DROP')];
  const g3Cnt=callRows.filter(r=>String(r.ACT_??'').trim()==='2').length;
  if(g3Cnt>=3){
    const g3Pct=Math.round(g3Cnt/callRows.length*100);
    items.push({lv:'warn',t:`3G 통화이력 ${g3Cnt}건 (전체 통화 ${callRows.length}건 중 ${g3Pct}%) — 3G 통화 다수 발생 확인 필요`});
  }
  // 14. SIM 이슈
  const simdChg=byFeat('SIMD').filter(r=>r._simdDiff&&r._simdDiff.length).length;
  if(simdChg>0)items.push({lv:'info',t:`SIM 상태 변화 ${simdChg}일 감지 — SIM Tray/접촉 이슈 확인 필요`});

  if(!items.length)items.push({lv:'good',t:'특이사항 없음 — 전반적으로 양호한 상태입니다.'});
  el.innerHTML='<div class="st" style="margin-top:0;margin-bottom:8px">자동 인사이트</div>'
    +'<div class="insight-list">'+items.map(it=>`<div class="insight-item i-${it.lv}"><div class="i-dot"></div><span>${it.t}</span></div>`).join('')+'</div>';
}

const TL_FEATS=['CEND','DROP','MUTE','RLFI','CRSH','SIMD','REST','REGI','MMRJ'];
const TL_COLORS={CEND:'#1a6fa0',DROP:'#c0392b',MUTE:'#b7640a',RLFI:'#1e8449',CRSH:'#8e1a1a',SIMD:'#6c3483',REST:'#888888',REGI:'#2980b9',MMRJ:'#8e44ad'};
let tlOpen=false;
function toggleTimeline(){
  tlOpen=!tlOpen;
  const body=document.getElementById('tlBody');
  const chev=document.getElementById('tlChevron');
  if(!body)return;
  body.style.display=tlOpen?'block':'none';
  if(chev)chev.textContent=tlOpen?'▲':'▼';
  if(tlOpen)renderTimeline();
}
function renderTimeline(){
  const inner=document.getElementById('tlInner');if(!inner)return;
  const rows=buildRawRows().filter(r=>TL_FEATS.includes(r.Feature));
  if(!rows.length){inner.innerHTML='<div class="no-data">표시할 이벤트 없음</div>';return;}
  const toMs=r=>{const t=new Date(r.Date+'T'+r.Time);return isNaN(t.getTime())?0:t.getTime();};
  const msArr=rows.map(toMs).filter(t=>t>0);
  if(!msArr.length){inner.innerHTML='<div class="no-data">시간 정보 없음</div>';return;}
  const minMs=Math.min(...msArr),maxMs=Math.max(...msArr),span=maxMs-minMs||1;
  const xPct=ms=>(((ms-minMs)/span)*100).toFixed(3)+'%';
  const dates=getDates();
  const activeFeats=TL_FEATS.filter(f=>rows.some(r=>r.Feature===f));
  // Day separator axis
  let axisHtml='<div class="tl-axis">';
  dates.forEach((d,i)=>{
    const ms=new Date(d+'T00:00:00').getTime();
    if(ms<minMs||ms>maxMs+1)return;
    const p=xPct(Math.max(ms,minMs));
    axisHtml+=`<div class="tl-sep" style="left:${p}"></div><div class="tl-daylbl" style="left:${p}">${d.slice(5).replace('-','/')}</div>`;
  });
  axisHtml+='</div>';
  // Feature rows
  let rowsHtml='';
  activeFeats.forEach(feat=>{
    const color=TL_COLORS[feat]||'#888';
    const featRows=rows.filter(r=>r.Feature===feat);
    let dots='';
    featRows.forEach(r=>{
      const ms=toMs(r);if(!ms)return;
      const tip=buildTlTip(r);
      dots+=`<span class="tl-dot" style="left:${xPct(ms)};background:${color}" data-tip="${tip}"></span>`;
    });
    rowsHtml+=`<div class="tl-row"><div class="tl-label" style="color:${color}">${feat}</div><div class="tl-track">${dots}</div></div>`;
  });
  inner.innerHTML=axisHtml+rowsHtml;
}
function buildTlTip(r){
  let t=`${r.Date} ${r.Time}  [${r.Feature}]`;
  if(r.Feature==='DROP'&&r.SIPR)t+=`\nSIPR ${r.SIPR}: ${DROP_CAUSES[r.SIPR]||'Unknown'}`;
  if(r.Feature==='CEND'&&r.CTIM){const s=parseInt(r.CTIM||0);t+=`\n통화시간 ${Math.floor(s/60)}분 ${s%60}초`;}
  if(r.Feature==='MUTE'){const cs=['RSMT','RNMT','DBMT','UBMT'].filter(k=>r[k]==='1'||r[k]===1);if(cs.length)t+=`\n원인: ${cs.join(', ')}`;}
  if(r.TAC_)t+=`\nTAC ${r.TAC_}${r.PhID?' / PCI '+r.PhID:''}`;
  return t.replace(/"/g,"'");
}

  let html=`<div class="st">전체 기간 MUTE 유형 분포</div><div class="mg">

      const ecnts=dRows.filter(r=>isOne(r[t.key])).map(r=>fNum(r.ECNT)).filter(v=>v!==null);

      body+='<div class="day-row" style="border-left-color:'+t.color+'"><span class="day-key">['+t.key+']</span><span class="day-lbl">'+t.label+'</span><span class="day-cnt">'+n+'건</span>'+(ecnts.length>0?'<span class="day-sub">ECNT avg '+avgE+(highE>0?' &nbsp;<span class="ecnt-high">⚠ ≥5: '+highE+'건</span>':'')+'</span>':'')+'</div>';
    });
    const cendBadge=cendN>0?'<span class="badge" style="background:#e8f4fd;color:#1a6fa0">CEND '+cendN+'건</span>':'';
    const rateBadge=muteRate?'<span style="font-size:11px;color:#b7640a;font-weight:600;margin-left:6px">MUTE율 '+muteRate+'%</span>':'';
    const dBlers=dRows.map(r=>fNum(r.BLER)).filter(v=>v!==null&&v>0);
    const dBlerAvg=dBlers.length?avgArr(dBlers).toFixed(1):null;

  document.getElementById('muteContent').innerHTML=html;

function renderDropTab(){

    const tRows=dRows.map(r=>{
      const sipr=String(r.SIPR||'').trim();

      const adRow=fNum(r.RxP0)!==null&&fNum(r.RxP1)!==null&&Math.abs(fNum(r.RxP0)-fNum(r.RxP1))>=20;
      const siprCell=sipr?'<span style="font-weight:600;color:var(--red)">'+sipr+'</span> '+(DROP_CAUSES[sipr]||'Unknown'):'';

  document.getElementById('dropContent').innerHTML=html;
}
function renderStationTable(){
  const qTac=(document.getElementById('stTac').value||'').toLowerCase();
  const qPci=(document.getElementById('stPci').value||'').toLowerCase();
  const qBand=(document.getElementById('stBand').value||'').toLowerCase();
  const lv=document.getElementById('stFilter').value;
  const colFn={cend:s=>s.cends.length,drop:s=>s.drops.length,mute:s=>s.mutes.length,rlfi:s=>s.rlfis.length,prob:s=>s.problemRate,rsrp:s=>s.avgRsrp??-999,sinr:s=>s.avgSinr??-999,bler:s=>s.avgBler??-999};
  const lvO={issue:0,weak_sig:1,inter:2,high_bler:3,normal:4};
  let all=Object.values(stationMap).filter(s=>{
    if(lv==='antdiff')return s.hasAntDiff;
    if(lv&&lv!=='antdiff'&&s.level!==lv)return false;
    if(qTac&&!String(s.tac).toLowerCase().includes(qTac))return false;
    if(qPci&&!String(s.pid).toLowerCase().includes(qPci))return false;
    if(qBand&&!String(s.band||s.dch).toLowerCase().includes(qBand))return false;
    return true;
  });
  if(stSortCol==='default'||!colFn[stSortCol]){
    all.sort((a,b)=>(lvO[a.level]??9)-(lvO[b.level]??9)||(b.score-a.score));
  } else {
    const fn=colFn[stSortCol];
    all.sort((a,b)=>stSortDir==='desc'?fn(b)-fn(a):fn(a)-fn(b));
  }
  const lbl={issue:'이슈집중',weak_sig:'신호세기미약',inter:'셀중첩간섭',high_bler:'HighBLER',normal:'양호'};
  const lc={issue:'tr',weak_sig:'ta',inter:'tp',high_bler:'tb',normal:'tgr'};
  const thW=(col,label,w,bg)=>`<th class="th-sort${stSortCol===col?' '+stSortDir:''}" onclick="stSort('${col}')" style="width:${w}px;min-width:${w}px${bg?';background:'+bg:''}">${label}</th>`;
  const G1='#1a4080',G2='#1a5c3a',G3='#3b1f6e';
  const G1s='#225099',G2s='#226645',G3s='#4a2880';
  const grpTh=(label,span,bg)=>`<th colspan="${span}" style="background:${bg};font-size:11px;font-weight:700;padding:5px 4px;border-bottom:1px solid rgba(255,255,255,0.18);letter-spacing:.04em">${label}</th>`;
  document.getElementById('stHead').innerHTML=
    '<tr>'
    +'<th rowspan="2" style="width:32px;min-width:32px;background:var(--blue-800)">#</th>'
    +'<th rowspan="2" style="width:62px;min-width:62px;background:var(--blue-800)">상태</th>'
    +grpTh('기지국 정보',6,G1)
    +grpTh('발생 이벤트',4,G2)
    +grpTh('전계 정보(평균)',3,G3)
    +'</tr>'
    +'<tr>'
    +`<th style="width:86px;min-width:86px;background:${G1s}">PLMN</th>`
    +`<th style="width:56px;min-width:56px;background:${G1s}">ACT</th>`
    +`<th style="width:72px;min-width:72px;background:${G1s}">TAC(HEX)</th>`
    +`<th style="width:72px;min-width:72px;background:${G1s}">TAC(DEC)</th>`
    +`<th style="width:52px;min-width:52px;background:${G1s}">PCI</th>`
    +`<th style="width:56px;min-width:56px;background:${G1s}">Band</th>`
    +thW('cend','CEND',52,G2s)+thW('drop','DROP',52,G2s)+thW('mute','MUTE',52,G2s)+thW('rlfi','RLF',52,G2s)
    +thW('rsrp','RSRP',72,G3s)+thW('sinr','SINR',72,G3s)+thW('bler','BLER',60,G3s)
    +'</tr>';
  document.getElementById('stBody').innerHTML=all.length?all.map((s,i)=>{
    const rk=i+1;
    const rkCls=rk<=3?`r${rk}`:'';
    const tacDec=s.tac?parseInt(s.tac,16):NaN;
    const ACT_MAP_ST={'2':'3G','4':'LTE','6':'NR'};
    const stAllRows=[...s.drops,...s.cends,...s.mutes,...s.rlfis];
    const plmnRaw=stAllRows.map(r=>(r.PLMN||'').replace(/[^0-9]/g,'')).find(p=>p)||'';
    const plmnDisp=plmnRaw?(PLMN_OP[plmnRaw]?plmnRaw+'('+PLMN_OP[plmnRaw]+')':plmnRaw):'';
    const actRaw=stAllRows.map(r=>String(r.ACT_??'').trim()).find(a=>a)||'';
    const actDisp=actRaw?(ACT_MAP_ST[actRaw]||actRaw):(s.rlfis.length>0&&s.drops.length===0&&s.mutes.length===0&&s.cends.length===0?'LTE':'');
    const dropCell=s.drops.length>0?`${s.drops.length}${s.dropRate>0?` <span style="font-size:11px;color:#e57373">(${s.dropRate.toFixed(1)}%)</span>`:''}`:0;
    const rsrpBad=s.avgRsrp!==null&&s.avgRsrp<=-100;
    const sinrBad=s.avgSinr!==null&&s.avgSinr<0;
    const muteTipParts=['RSMT','RNMT','DBMT','UBMT'].map(k=>{const n=s.mutes.filter(r=>r[k]==='1'||r[k]===1).length;return n>0?k+' '+n+'건':null;}).filter(Boolean);
    const muteTip=muteTipParts.join(', ');
    return`<tr>
      <td><span class="rank-badge ${rkCls}">${rk}</span></td>
      <td><span class="badge ${lc[s.level]}">${lbl[s.level]}</span></td>
      <td>${plmnDisp}</td><td>${actDisp}</td>
      <td>${s.tac}</td><td>${isNaN(tacDec)?'':tacDec}</td><td>${s.pid}</td><td>${s.band||s.dch}</td>
      <td>${s.cends.length}</td>
      <td style="color:${s.drops.length>0?'#c0392b':'inherit'}">${dropCell}</td>
      <td style="color:${s.nonMicMutes.length>0?'#b7640a':'inherit'}" data-tip="${muteTip}">${s.nonMicMutes.length}</td>
      <td style="color:${s.rlfis.length>0?'#1a6fa0':'inherit'}">${s.rlfis.length}</td>
      <td style="color:${rsrpBad?'#c0392b':'inherit'};font-weight:${rsrpBad?700:400}">${s.avgRsrp!==null?s.avgRsrp:'-'}</td>
      <td style="color:${sinrBad?'#c0392b':'inherit'};font-weight:${sinrBad?700:400}">${s.avgSinr!==null?s.avgSinr:'-'}</td>
      <td style="color:${s.avgBler!==null&&s.avgBler>=40?'#b7640a':'inherit'};font-weight:${s.avgBler!==null&&s.avgBler>=40?700:400}">${s.avgBler!==null?s.avgBler:'-'}</td>
    </tr>`;
  }).join(''):'<tr><td colspan="15" class="no-data">해당 기지국이 없습니다.</td></tr>';
  document.getElementById('stCount').textContent=`총 ${all.length}개 기지국`;
}

function buildRawRows(){
  const rows=[];
  allRows.forEach(r=>{
    if(r.Feature==='RLFI'){
      const key=`${r.Date}|${r.Time}`;
      (rlfByRlfi[key]||[]).forEach(e=>rows.push(e));
    } else {
      rows.push(r);
    }
  });
  rows.sort((a,b)=>{const da=a.Date+a.Time,db=b.Date+b.Time;return da<db?-1:da>db?1:0;});
  const toSec=r=>{
    if(r._sec!=null)return r._sec;
    const t=new Date(r.Date+'T'+r.Time);
    r._sec=isNaN(t.getTime())?0:Math.floor(t.getTime()/1000);
    return r._sec;
  };
  rows.forEach(r=>{r._grpKey=null;toSec(r);});
  // Step 1: CEND+CTIM 기반 통화 윈도우 그룹
  let gid=0;
  const callWindows=[];
  rows.forEach(r=>{
    if(r.Feature==='CEND'){
      const ctim=parseInt(r.CTIM||0,10);
      if(ctim>0)callWindows.push({start:toSec(r)-ctim,end:toSec(r),gid:gid++});
    }
  });
  if(callWindows.length>0){
    rows.forEach(r=>{
      const s=toSec(r);
      for(const w of callWindows){if(s>=w.start&&s<=w.end){r._grpKey='grp'+w.gid;break;}}
    });
    const gcnt={};
    rows.forEach(r=>{if(r._grpKey)gcnt[r._grpKey]=(gcnt[r._grpKey]||0)+1;});
    rows.forEach(r=>{if(r._grpKey&&gcnt[r._grpKey]<=1)r._grpKey=null;});
  }
  // Step 2: 윈도우 밖 GROUP_FEATS는 2초 근접 그룹핑
  const GROUP_FEATS=new Set(['MUTE','CEND','DROP','PSCI']);
  const grpRows=rows.filter(r=>!r._grpKey&&GROUP_FEATS.has(r.Feature));
  grpRows.sort((a,b)=>toSec(a)-toSec(b));
  if(grpRows.length>0){
    let pid=0;
    grpRows[0]._proxIdx=0;
    for(let i=1;i<grpRows.length;i++){
      if(toSec(grpRows[i])-toSec(grpRows[i-1])<=2)grpRows[i]._proxIdx=pid;
      else grpRows[i]._proxIdx=++pid;
    }
    const pcnt={};
    grpRows.forEach(r=>pcnt[r._proxIdx]=(pcnt[r._proxIdx]||0)+1);
    grpRows.forEach(r=>{r._grpKey=pcnt[r._proxIdx]>1?('grp'+(gid+r._proxIdx)):null;});
  }
  return rows;
}

    const gc=callNum?GRP_COLORS[(callNum-1)%GRP_COLORS.length]:null;
    const grpStyle=gc?'background:'+gc.bg+';border-left:3px solid '+gc.bd+';'+(isFirst?'border-top:2px solid '+gc.bd+';':'')+(isLast?'border-bottom:2px solid '+gc.bd+';':''):''
    const callCell=isFirst&&gc?'<td style="text-align:center;padding:2px 1px"><span style="display:inline-flex;align-items:center;justify-content:center;padding:2px 4px;border-radius:99px;background:'+gc.bd+';color:#fff;font-size:9px;font-weight:700;white-space:nowrap;cursor:default" title="Call #'+callNum+' 동일 시간 이벤트 그룹">Call #'+callNum+'</span></td>':isGrp&&gc?'<td style="padding:0 22px"><div style="width:3px;height:28px;border-radius:2px;background:'+gc.bd+';opacity:0.5;margin:auto"></div></td>':'<td></td>';
    const mainRow='<tr style="'+grpStyle+'">'+callCell+RAW_FIXED.map(c=>{
      const v=r[c]??'';
      if(c==='Feature'){const col=FC[v]||{bg:'#f5f5f5',tc:'#555'};const tip=FEAT_DESC[v]||'';return'<td style="text-align:center;font-size:0"><span class="badge feat-tip" style="font-size:11px;background:'+col.bg+';color:'+col.tc+'"'+(tip?' data-tip="'+tip+'"':'')+'>'+v+'</span></td>';}
      if(c==='PLMN'){const raw=(r.PLMN||'').replace(/[^0-9]/g,'');const op=PLMN_OP[raw]||'';return'<td style="text-align:center">'+(raw?raw+(op?'('+op+')':''):'' )+'</td>';}
      if(c==='ACT'){if(r.Feature==='RLF')return'<td style="text-align:center">4(LTE)</td>';const v2=String(r.ACT_??'').trim();const lbl=ACT_MAP[v2];return'<td style="text-align:center">'+(v2?(lbl?v2+'('+lbl+')':v2):'')+'</td>';}
      if(c==='TAC(HEX)')return'<td style="text-align:center">'+(r.TAC_??'')+'</td>';
      if(c==='TAC(DEC)'){const h=String(r.TAC_??'').trim();const d=h?parseInt(h,16):NaN;return'<td style="text-align:center">'+(isNaN(d)?'':d)+'</td>';}
      if(c==='Band(DLCh)')return'<td style="text-align:center">'+getRawBandDLCh(r)+'</td>';
      if(c==='RSRP')return'<td style="text-align:center">'+getRawRSRP(r)+'</td>';
      if(c==='SINR')return'<td style="text-align:center">'+getRawSINR(r)+'</td>';
      if(c==='BLER')return'<td style="text-align:center">'+getRawBLER(r)+'</td>';
      if(c==='Cause'){const cv=getRawCause(r);return'<td style="font-size:9px;color:var(--text-secondary);white-space:normal;line-height:1.4">'+cv+'</td>';}
      if(c==='참고'){const nv=getRawNote(r);return'<td style="font-size:9px;color:#222;white-space:normal;line-height:1.7">'+nv.split(' · ').join('<br>')+'</td>';}
      return'<td style="text-align:center">'+v+'</td>';
    }).join('')+'<td><button class="det-btn" onclick="toggleDetail('+gi+')" title="세부 정보">'+(isOpen?'▲':'▼')+'</button></td></tr>';
    if(!isOpen)return mainRow;
    let detailRow;
    if(r.Feature==='RLFI'){
      const key=`${r.Date}|${r.Time}`;
      const evts=rlfByRlfi[key]||[];
      const thS='style="padding:4px 8px;background:#ddeeff;font-weight:600;font-size:11px;border-bottom:1px solid #c0d8f0"';
      const tdS='style="padding:4px 8px;font-size:11px;border-bottom:1px solid #eef2f8"';
      const rows=evts.map((e,idx)=>{
        const corrected=e._timeCorrected&&(e.Date!==r.Date||e.Time!==r.Time);
        const cauVal=e.CAU??'';
        const cauLabel=cauVal!==''?(CAU_CODES[String(cauVal)]||`Code ${cauVal}`):'';
        const cauColor={'1':'#c0392b','2':'#c0392b','4':'#c0392b','5':'#c0392b','7':'#e67e22','6':'#e67e22','3':'#8e44ad','8':'#7f8c8d','0':'#aaa'}[String(cauVal)]||'#aaa';
        return`<tr>
          <td ${tdS}>${idx+1}</td>
          <td ${tdS} style="padding:4px 8px;font-size:11px;border-bottom:1px solid #eef2f8;${corrected?'color:#2980b9;font-weight:600':''}">${e.Date}</td>
          <td ${tdS} style="padding:4px 8px;font-size:11px;border-bottom:1px solid #eef2f8;${corrected?'color:#2980b9;font-weight:600':''}">${e.Time}${corrected?` <span style="font-size:10px;color:#888">(보정)</span>`:''}</td>
          <td ${tdS}>${e.TAC_}</td><td ${tdS}>${e.PhID}</td><td ${tdS}>${e.DLCh}</td>
          <td ${tdS}>${e.RxP0??'-'}</td>
          <td ${tdS}>${cauVal!==''?`<span style="font-weight:600;color:${cauColor}">[${cauVal}] ${cauLabel}</span>`:'-'}</td>
          <td ${tdS}>${e.PLMN??'-'}</td>
        </tr>`;
      }).join('');
      detailRow=`<tr class="detail-row"><td colspan="${RAW_FIXED.length+2}">
        <div style="padding:10px 14px;background:#f0f6ff;border-top:1px solid #c8daf5">
          <div style="font-size:11px;font-weight:700;color:#2980b9;margin-bottom:6px">개별 RLF 이벤트 ${evts.length}건 (RLFI 이벤트시간: ${r.Date} ${r.Time})</div>
          <table style="border-collapse:collapse;width:auto">
            <thead><tr><th ${thS}>No</th><th ${thS}>실제 날짜</th><th ${thS}>실제 시간</th><th ${thS}>TAC</th><th ${thS}>PCI</th><th ${thS}>DLCh</th><th ${thS}>RxP</th><th ${thS}>원인 (CAU)</th><th ${thS}>PLMN</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div></td></tr>`;
    } else {
      const kvPairs=Object.entries(r).filter(([k])=>!SKIP_KEYS.has(k)&&!k.startsWith('_')&&r[k]!==''&&r[k]!==null&&r[k]!==undefined);
      detailRow=`<tr class="detail-row"><td colspan="${RAW_FIXED.length+2}"><div class="detail-grid">${kvPairs.map(([k,v])=>`<div class="detail-kv"><span class="detail-k">${k}</span><span class="detail-v">${v}</span></div>`).join('')}</div></td></tr>`;
    }
    return mainRow+detailRow;
  }).join(''):`<tr><td colspan="${RAW_FIXED.length+2}" class="no-data">데이터 없음</td></tr>`;
  const total=Math.ceil(rawFiltered.length/RP);
  let btns='';
  const btnStyle='padding:5px 10px;font-size:12px;margin:0 2px';
  if(rawPage>1)btns+=`<button class="btn" style="${btnStyle}" onclick="rawGo(1)">«</button>`;
  for(let p=Math.max(1,rawPage-2);p<=Math.min(total,rawPage+2);p++)
    btns+=`<button class="btn${p===rawPage?' btn-p':''}" style="${btnStyle}" onclick="rawGo(${p})">${p}</button>`;
  if(rawPage<total)btns+=`<button class="btn" style="${btnStyle}" onclick="rawGo(${total})">»</button>`;
  document.getElementById('rawPager').innerHTML=`<span>${rawFiltered.length}건 / 전체 ${buildRawRows().length}건</span><div>${btns}</div>`;
}
function rawGo(p){rawPage=p;renderRaw();}
function exportCSV(){
  const ACT_MAP_CSV={'2':'3G','4':'LTE','6':'NR'};
  function cellText(r,c){
    if(c==='PLMN'){const raw=(r.PLMN||'').replace(/[^0-9]/g,'');const op=PLMN_OP[raw]||'';return raw?(raw+(op?'('+op+')':'')):''}
    if(c==='ACT'){const v=String(r.ACT_??'').trim();const lbl=ACT_MAP_CSV[v];return v?(lbl?v+'('+lbl+')':v):''}
    if(c==='TAC(HEX)')return String(r.TAC_??'');
    if(c==='TAC(DEC)'){const h=String(r.TAC_??'').trim();const d=h?parseInt(h,16):NaN;return isNaN(d)?'':String(d);}
    if(c==='Band(DLCh)')return getRawBandDLCh(r);
    if(c==='RSRP')return String(getRawRSRP(r));
    if(c==='SINR')return String(getRawSINR(r));
    if(c==='BLER')return String(getRawBLER(r));
    if(c==='Cause')return getRawCause(r);
    if(c==='참고')return getRawNote(r);
    return String(r[c]??'');
  }
  const he=v=>String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const thS='background:#1a4080;color:#fff;font-size:11px;padding:4px 6px;text-align:left;white-space:nowrap;border:1px solid #0d2b5e';
  const tdS='font-size:11px;padding:3px 6px;text-align:left;vertical-align:top;border:1px solid #dde0e8;white-space:pre-wrap';
  const tdA='font-size:11px;padding:3px 6px;text-align:left;vertical-align:top;border:1px solid #dde0e8;white-space:pre-wrap;background:#f8fafc';
  let xls='<html xmlns:o=\"urn:schemas-microsoft-com:office:office\" xmlns:x=\"urn:schemas-microsoft-com:office:excel\"><head><meta charset=\"UTF-8\"><style>table{border-collapse:collapse}</style></head><body><table>';
  xls+='<colgroup>'+RAW_FIXED.map(c=>`<col style="width:${Math.round((RAW_COL_W[c]||80)*0.75)}pt">`).join('')+'</colgroup>';
  xls+='<thead><tr>'+RAW_FIXED.map(c=>`<th style="${thS}">${he(c)}</th>`).join('')+'</tr></thead>';
  xls+='<tbody>'+rawFiltered.map((r,i)=>'<tr>'+RAW_FIXED.map(c=>`<td style="${i%2?tdA:tdS}">${he(cellText(r,c))}</td>`).join('')+'</tr>').join('')+'</tbody>';
  xls+='</table></body></html>';
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+xls],{type:'application/vnd.ms-excel;charset=utf-8'}));
  a.download='log_parsed.xls';a.click();
}
function getTop3Stations(){
  const lvO={issue:0,weak_sig:1,inter:2,high_bler:3,normal:4};
  const all=Object.values(stationMap);
  all.sort((a,b)=>(lvO[a.level]??9)-(lvO[b.level]??9)||(b.score-a.score));
  return all.slice(0,3);
}
function exportTop3Stations(mode){
  const top3=getTop3Stations();
  if(!top3.length){alert('기지국 데이터가 없습니다.');return;}
  const ACT_MAP_ST={'2':'3G','4':'LTE','6':'NR'};
  const lbl={issue:'이슈집중',weak_sig:'신호세기미약',inter:'셀중첩간섭',high_bler:'HighBLER',normal:'양호'};
  const hdrs=['순위','상태','PLMN','ACT','TAC(HEX)','TAC(DEC)','PCI','Band','CEND','DROP','MUTE','RLF','RSRP','SINR','BLER'];
  const rows=top3.map((s,i)=>{
    const allR=[...s.drops,...s.cends,...s.mutes,...s.rlfis];
    const plmnRaw=allR.map(r=>(r.PLMN||'').replace(/[^0-9]/g,'')).find(p=>p)||'';
    const plmnDisp=plmnRaw?(PLMN_OP[plmnRaw]?plmnRaw+'('+PLMN_OP[plmnRaw]+')':plmnRaw):'';
    const actRaw=allR.map(r=>String(r.ACT_??'').trim()).find(a=>a)||'';
    const actDisp=actRaw?(ACT_MAP_ST[actRaw]||actRaw):'';
    const tacDec=s.tac?parseInt(s.tac,16):NaN;
    return[String(i+1),lbl[s.level]||s.level,plmnDisp,actDisp,s.tac,isNaN(tacDec)?'':String(tacDec),s.pid,s.band||s.dch,String(s.cends.length),String(s.drops.length),String(s.nonMicMutes.length),String(s.rlfis.length),s.avgRsrp!==null?String(s.avgRsrp):'-',s.avgSinr!==null?String(s.avgSinr):'-',s.avgBler!==null?String(s.avgBler):'-'];
  });
  if(mode==='csv'){
    const esc=v=>`"${String(v).replace(/"/g,'""')}"`;
    const csv=[hdrs.map(esc).join(','),...rows.map(r=>r.map(esc).join(','))].join('\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}));
    a.download='top3_stations.csv';a.click();
  } else {
    const lines=[hdrs.join('\t'),...rows.map(r=>r.join('\t'))].join('\n');
    navigator.clipboard.writeText(lines).then(()=>alert('상위 3개 기지국 내용이 클립보드에 복사되었습니다.')).catch(()=>alert('클립보드 접근 권한이 필요합니다.'));
  }
}
function showTab(name){
  ['overview','station','mute','drop','daily','trend','raw'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===name?'block':'none';});
  document.querySelectorAll('.tab').forEach((b,i)=>{b.classList.toggle('active',['overview','station','mute','drop','daily','trend','raw'][i]===name);});
  if(name==='trend')renderTrend();
  if(name==='station')renderStationTable();
  if(name==='drop')renderDropTab();
}
(function(){
  const tip=document.createElement('div');
  tip.style.cssText='position:fixed;z-index:9999;background:#1e293b;color:#f1f5f9;font-size:11.5px;padding:5px 10px;border-radius:6px;box-shadow:0 4px 14px rgba(0,0,0,.3);pointer-events:none;display:none;white-space:nowrap;line-height:1.6;max-width:320px;white-space:normal';
  document.body.appendChild(tip);
  document.addEventListener('mouseover',function(e){
    const el=e.target.closest('[data-tip]');
    if(el&&el.dataset.tip){
      tip.textContent=el.dataset.tip;
      tip.style.display='block';
      const r=el.getBoundingClientRect();
      let l=r.left+r.width/2-tip.offsetWidth/2;
      let t=r.top-tip.offsetHeight-8;
      if(l<4)l=4;
      if(l+tip.offsetWidth>window.innerWidth-4)l=window.innerWidth-tip.offsetWidth-4;
      if(t<4)t=r.bottom+8;
      tip.style.left=l+'px';
      tip.style.top=t+'px';
    }else{
      tip.style.display='none';
    }
  });
})();
</script>
